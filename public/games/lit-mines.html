<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Lit Mines — LitDeX</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&family=JetBrains+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050912; color: #fff; touch-action: manipulation; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; font-family: 'Fredoka One', cursive; }
  #game { position: relative; width: 100%; height: 100%; overflow: hidden;
    background: radial-gradient(ellipse 100% 50% at 50% 0%, rgba(200,80,80,0.12) 0%, transparent 60%), linear-gradient(180deg, #04070d 0%, #0a1226 100%); }

  #hud { position: absolute; top: 0; left: 0; right: 0; z-index: 6; padding: 14px 12px 0; padding-top: max(14px, env(safe-area-inset-top)); display: flex; justify-content: space-between; gap: 8px; pointer-events: none; }
  .pill { flex: 1; background: linear-gradient(180deg, rgba(15,25,45,0.95), rgba(5,10,20,0.92)); border: 1px solid rgba(140,180,255,0.18); border-radius: 12px; padding: 7px 10px 8px; font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.16em; color: #aac6ee; text-transform: uppercase; text-align: center; backdrop-filter: blur(6px); }
  .pill .v { display: block; color: #fff; font-weight: 700; font-size: 16px; margin-top: 3px; letter-spacing: 0.5px; }
  .pill.bal .v   { color: #5be0a4; }
  .pill.mult .v  { color: #ffe97a; font-size: 18px; }
  .pill.bombs .v { color: #ff8a8a; }

  #board-host { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -56%); z-index: 4; }
  #board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 6px; background: rgba(15,25,45,0.7); border: 1px solid rgba(140,180,255,0.18); border-radius: 14px; }
  .cell { width: 56px; height: 56px; border-radius: 10px; background: linear-gradient(180deg, #2a3450, #131b30); border: 1px solid rgba(140,180,255,0.18); display: flex; align-items: center; justify-content: center; font-family: 'Bangers', cursive; font-size: 22px; color: rgba(255,255,255,0.5); cursor: pointer; transition: transform 0.12s ease, background 0.2s ease, border 0.2s ease; -webkit-tap-highlight-color: transparent; }
  .cell:active { transform: scale(0.96); }
  .cell.safe   { background: linear-gradient(180deg, #5be0a4, #1f9c66); border-color: #5be0a4; color: #04241a; box-shadow: 0 0 18px rgba(91,224,164,0.5); }
  .cell.bomb   { background: linear-gradient(180deg, #ff5a6e, #8a1c30); border-color: #ff5a6e; color: #fff; box-shadow: 0 0 22px rgba(255,90,110,0.6); }
  .cell.dimmed { opacity: 0.45; }
  .cell.locked { pointer-events: none; }

  /* Bomb-count selector + cashout */
  #setup-row { position: absolute; left: 12px; right: 12px; bottom: 132px; z-index: 5; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .bomb-btn { min-height: 44px; border-radius: 10px; border: 1px solid rgba(140,180,255,0.22); background: rgba(15,25,45,0.85); color: #fff; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .bomb-btn.on { background: linear-gradient(180deg, #ff7a45, #c54616); border-color: #ff7a45; color: #fff; box-shadow: 0 3px 0 rgba(0,0,0,0.3); }

  #stat-row { position: absolute; left: 12px; right: 12px; bottom: 84px; z-index: 5; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .sbox { background: linear-gradient(180deg, rgba(15,25,45,0.95), rgba(5,10,20,0.92)); border: 1px solid rgba(140,180,255,0.18); border-radius: 10px; padding: 6px 6px 7px; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.14em; color: #aac6ee; text-transform: uppercase; }
  .sbox .v { display: block; color: #fff; font-weight: 700; font-size: 14px; margin-top: 2px; }
  .sbox .v.gold  { color: #ffe97a; }
  .sbox .v.green { color: #5be0a4; }

  #action-btn { position: absolute; left: 12px; right: 12px; bottom: 16px; bottom: max(16px, env(safe-area-inset-bottom)); z-index: 6; min-height: 56px; border-radius: 12px; border: none; background: linear-gradient(180deg, #5be0a4, #1f9c66); color: #04241a; font-family: 'Bangers', cursive; font-size: 22px; letter-spacing: 4px; text-shadow: 0 2px 0 rgba(255,255,255,0.2); box-shadow: 0 6px 0 #0e5d3a, 0 0 28px rgba(91,224,164,0.4); cursor: pointer; -webkit-tap-highlight-color: transparent; }
  #action-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #0e5d3a, 0 0 36px rgba(91,224,164,0.6); }
  #action-btn:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(0.3); }

  #panel { position: absolute; inset: 0; z-index: 30; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.78); backdrop-filter: blur(6px); transition: opacity 0.3s ease; }
  #panel.hidden { opacity: 0; pointer-events: none; }
  .panel-card { background: #0a0e1a; border: 1px solid #1f2638; border-radius: 18px; padding: 26px 22px; text-align: center; width: 88%; max-width: 360px; color: #fff; }
  .panel-title { font-family: 'Bangers', cursive; font-size: 38px; letter-spacing: 4px; margin-bottom: 4px; text-shadow: 0 0 18px rgba(255,138,140,0.4); }
  .panel-sub   { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.18em; color: rgba(255,255,255,0.55); text-transform: uppercase; margin-bottom: 16px; }
  .panel-row   { display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 12px; margin: 6px 0; }
  .panel-row .lbl { color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 0.12em; }
  .panel-row .val { color: #fff; font-weight: 700; }
  .panel-big { font-family: 'JetBrains Mono', monospace; font-size: 44px; line-height: 1; font-weight: 700; margin: 14px 0 4px; }
  .panel-big.green { color: #5be0a4; } .panel-big.red { color: #ff8a8a; }
  .panel-btns { display: flex; gap: 10px; margin-top: 14px; }
  .panel-btn { flex: 1; min-height: 48px; border-radius: 10px; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border: 1px solid #333; background: transparent; color: #fff; -webkit-tap-highlight-color: transparent; }
  .panel-btn.primary { background: #fff; color: #000; border: none; }
  .panel-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #err-banner { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); background: rgba(239,73,86,0.92); color: #fff; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.1em; padding: 8px 14px; border-radius: 8px; z-index: 40; opacity: 0; transition: opacity 0.25s ease; pointer-events: none; }
  #err-banner.visible { opacity: 1; }
</style>
</head>
<body>
<div id="game">
  <div id="hud">
    <div class="pill bal">BALANCE<span class="v" id="hud-bal">0</span></div>
    <div class="pill mult">MULT<span class="v" id="hud-mult">1.00x</span></div>
    <div class="pill bombs">BOMBS<span class="v" id="hud-bombs">3</span></div>
  </div>

  <div id="board-host"><div id="board"></div></div>

  <div id="setup-row">
    <button class="bomb-btn on" data-b="3">3 BOMBS</button>
    <button class="bomb-btn"     data-b="5">5 BOMBS</button>
    <button class="bomb-btn"     data-b="10">10 BOMBS</button>
  </div>

  <div id="stat-row">
    <div class="sbox">REVEALED<span class="v" id="stat-revealed">0</span></div>
    <div class="sbox">PAYOUT<span class="v gold" id="stat-payout">0 PTS</span></div>
  </div>

  <button id="action-btn" disabled>PICK BOMBS</button>

  <div id="panel">
    <div class="panel-card">
      <div class="panel-title" id="panel-title">LIT MINES</div>
      <div class="panel-sub" id="panel-sub">Pick safe tiles · cash out anytime · avoid the bombs</div>
      <div id="panel-body"></div>
      <div class="panel-btns">
        <button class="panel-btn primary" id="btn-primary">PLAY · 5 PTS</button>
        <button class="panel-btn" id="btn-exit">EXIT</button>
      </div>
    </div>
  </div>
  <div id="err-banner"><span id="err-msg"></span></div>
</div>
<script>
(() => {
  const params = new URLSearchParams(location.search);
  const wallet = (params.get('wallet') || '').toLowerCase();
  const API = (params.get('api') || 'https://game.test-hub.xyz').replace(/\/$/, '');
  const postParent = (m) => { try { window.parent && window.parent.postMessage(m, '*'); } catch {} };

  const STAKE = 5;
  const SIZE = 25;
  const DAILY = 20;

  const $ = (id) => document.getElementById(id);
  const panel = $('panel'), pTitle = $('panel-title'), pSub = $('panel-sub'), pBody = $('panel-body');
  const btnP = $('btn-primary'), btnX = $('btn-exit');
  const hudBal = $('hud-bal'), hudMult = $('hud-mult'), hudBombs = $('hud-bombs');
  const board = $('board'), actionBtn = $('action-btn');
  const stRevealed = $('stat-revealed'), stPayout = $('stat-payout');
  const errBanner = $('err-banner'), errMsg = $('err-msg');

  let audioCtx = null;
  function tone(f, dur, type='sine', g=0.16) { try { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); if (audioCtx.state==='suspended') audioCtx.resume(); const o=audioCtx.createOscillator(), gN=audioCtx.createGain(); o.type=type; o.frequency.value=f; gN.gain.setValueAtTime(0.0001,audioCtx.currentTime); gN.gain.exponentialRampToValueAtTime(g,audioCtx.currentTime+0.008); gN.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur/1000); o.connect(gN).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+dur/1000); } catch{} }
  function sndSafe(level){ tone(440 + level*40, 70, 'square', 0.13); setTimeout(()=>tone(660 + level*60, 60, 'square', 0.10), 40); }
  function sndBomb(){ tone(120, 320, 'sawtooth', 0.22); setTimeout(()=>tone(80, 380, 'sawtooth', 0.18), 100); }
  function sndCash(){ tone(523,70,'square',0.15); setTimeout(()=>tone(659,70,'square',0.15),80); setTimeout(()=>tone(880,140,'square',0.16),160); }

  const ST = { roundId: null, token: null, stake: STAKE, bombs: 3, busy: false, gamesLeft: 0, revealed: [], multiplier: 1, multipliers: [], gameActive: false };

  function showErr(m) { errMsg.textContent = m||'error'; errBanner.classList.add('visible'); setTimeout(()=>errBanner.classList.remove('visible'), 2400); }

  function buildBoard() {
    board.innerHTML = '';
    for (let i = 0; i < SIZE; i++) {
      const c = document.createElement('div');
      c.className = 'cell';
      c.dataset.idx = String(i);
      c.onclick = () => onCellClick(i);
      board.appendChild(c);
    }
  }

  document.querySelectorAll('.bomb-btn').forEach((el) => {
    el.onclick = () => {
      if (ST.gameActive) return;
      ST.bombs = Number(el.dataset.b);
      hudBombs.textContent = String(ST.bombs);
      document.querySelectorAll('.bomb-btn').forEach((b) => b.classList.toggle('on', b === el));
    };
  });

  async function fetchStats() {
    if (!wallet) return null;
    try { const r = await fetch(`${API}/litmines/stats/${wallet}`); if (!r.ok) return null; return await r.json(); } catch { return null; }
  }

  async function showLobby() {
    const stats = await fetchStats();
    const left = stats ? Math.max(0, Number(stats.gamesLeft||0)) : DAILY;
    const bal  = stats ? Number(stats.pointsBalance||0) : 0;
    const bestM = stats ? Number(stats.bestMultiplier||0) : 0;
    ST.gamesLeft = left;
    hudBal.textContent = String(bal);
    const noGames = left <= 0;
    const lowBal = bal < STAKE;
    pTitle.textContent = 'LIT MINES';
    pSub.textContent = noGames ? 'Daily limit reached' : (lowBal ? `Need ${STAKE} PTS to play` : 'Pick safe tiles · cash out · don\u2019t hit a bomb');
    pBody.innerHTML = `
      <div class="panel-row"><span class="lbl">Stake</span><span class="val">${STAKE} PTS</span></div>
      <div class="panel-row"><span class="lbl">Grid</span><span class="val">5×5</span></div>
      <div class="panel-row"><span class="lbl">Bombs</span><span class="val">3 / 5 / 10</span></div>
      <div class="panel-row"><span class="lbl">RTP</span><span class="val">97%</span></div>
      <div class="panel-row"><span class="lbl">Games Today</span><span class="val">${DAILY-left}/${DAILY}</span></div>
      <div class="panel-row"><span class="lbl">Best Multiplier</span><span class="val">${bestM.toFixed(2)}x</span></div>
    `;
    btnP.disabled = noGames || lowBal;
    btnP.textContent = noGames ? 'NO GAMES LEFT' : (lowBal ? 'NOT ENOUGH PTS' : `PLAY · ${STAKE} PTS`);
    btnP.onclick = (noGames || lowBal) ? () => {} : startRound;
    panel.classList.remove('hidden');
  }
  btnX.onclick = () => postParent({ type: 'litdex:litmines:exit' });

  async function startRound() {
    if (!wallet) { showErr('No wallet'); return; }
    btnP.disabled = true; btnP.textContent = 'STAKING…';
    try {
      const r = await fetch(`${API}/litmines/start`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ wallet, bombs: ST.bombs }) });
      const d = await r.json();
      if (!r.ok || d.error) { showErr(d?.error || 'start_failed'); btnP.disabled = false; btnP.textContent = `PLAY · ${STAKE} PTS`; return; }
      ST.roundId = d.roundId; ST.token = d.token; ST.stake = d.stake; ST.bombs = d.bombs; ST.multipliers = d.multipliers || [];
      ST.gamesLeft = d.gamesLeft;
      ST.revealed = []; ST.multiplier = 1; ST.gameActive = true;
      hudBombs.textContent = String(ST.bombs);
      hudMult.textContent = '1.00x';
      stRevealed.textContent = '0';
      stPayout.textContent = '0 PTS';
      document.querySelectorAll('.cell').forEach((c) => { c.className = 'cell'; c.textContent = ''; });
      document.querySelectorAll('.bomb-btn').forEach((b) => b.disabled = true);
      actionBtn.disabled = true;
      actionBtn.textContent = 'PICK A TILE';
      panel.classList.add('hidden');
      fetchStats().then((s) => { if (s) hudBal.textContent = String(s.pointsBalance || 0); });
    } catch { showErr('Network error'); btnP.disabled = false; btnP.textContent = `PLAY · ${STAKE} PTS`; }
  }

  async function onCellClick(i) {
    if (!ST.gameActive || ST.busy) return;
    if (ST.revealed.includes(i)) return;
    ST.busy = true;
    try {
      const r = await fetch(`${API}/litmines/reveal`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ roundId: ST.roundId, token: ST.token, cell: i }) });
      const d = await r.json();
      if (!r.ok || d.error) { showErr(d?.error || 'reveal_failed'); ST.busy = false; return; }
      const cell = document.querySelector(`.cell[data-idx="${i}"]`);
      if (d.hit === 'bomb') {
        sndBomb();
        cell.classList.add('bomb', 'locked');
        cell.textContent = '💣';
        for (const b of (d.bombCells || [])) {
          if (b === i) continue;
          const el = document.querySelector(`.cell[data-idx="${b}"]`);
          if (el) { el.classList.add('bomb', 'dimmed', 'locked'); el.textContent = '💣'; }
        }
        document.querySelectorAll('.cell').forEach((el) => el.classList.add('locked'));
        ST.gameActive = false;
        document.querySelectorAll('.bomb-btn').forEach((b) => b.disabled = false);
        actionBtn.disabled = true; actionBtn.textContent = 'BOMB HIT';
        endPanel({ won: false, profit: -ST.stake, awarded: 0, stake: ST.stake, multiplier: 0, revealedCount: ST.revealed.length, serverSeed: d.serverSeed, txHash: null });
        ST.busy = false;
        return;
      }
      // Safe.
      sndSafe(ST.revealed.length);
      ST.revealed = d.revealed;
      ST.multiplier = d.multiplier;
      cell.classList.add('safe', 'locked');
      cell.textContent = '💎';
      hudMult.textContent = `${ST.multiplier.toFixed(2)}x`;
      stRevealed.textContent = String(ST.revealed.length);
      stPayout.textContent = `${Math.floor(ST.stake * ST.multiplier * 100) / 100} PTS`;
      actionBtn.disabled = false;
      actionBtn.textContent = `CASH OUT · ${(ST.stake * ST.multiplier).toFixed(2)} PTS`;
      if (d.autoCashout) {
        // All safe cells revealed.
        sndCash();
        ST.gameActive = false;
        document.querySelectorAll('.cell').forEach((el) => el.classList.add('locked'));
        document.querySelectorAll('.bomb-btn').forEach((b) => b.disabled = false);
        actionBtn.disabled = true; actionBtn.textContent = 'BOARD CLEARED';
        endPanel({ won: true, profit: d.profit, awarded: d.awarded, stake: d.stake, multiplier: d.multiplier, revealedCount: d.revealed.length, serverSeed: d.serverSeed, txHash: d.txHash, explorerUrl: d.explorerUrl });
      }
      ST.busy = false;
    } catch { showErr('Network error'); ST.busy = false; }
  }

  actionBtn.onclick = async () => {
    if (!ST.gameActive || ST.busy || ST.revealed.length === 0) return;
    ST.busy = true;
    actionBtn.disabled = true;
    try {
      const r = await fetch(`${API}/litmines/cashout`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ roundId: ST.roundId, token: ST.token }) });
      const d = await r.json();
      if (!r.ok || d.error) { showErr(d?.error || 'cashout_failed'); ST.busy = false; actionBtn.disabled = false; return; }
      sndCash();
      ST.gameActive = false;
      // Reveal bomb cells dimmed.
      for (const b of (d.bombCells || [])) {
        const el = document.querySelector(`.cell[data-idx="${b}"]`);
        if (el && !el.classList.contains('safe')) { el.classList.add('bomb', 'dimmed'); el.textContent = '💣'; }
      }
      document.querySelectorAll('.cell').forEach((el) => el.classList.add('locked'));
      document.querySelectorAll('.bomb-btn').forEach((b) => b.disabled = false);
      actionBtn.textContent = 'CASHED OUT';
      endPanel({ won: true, profit: d.profit, awarded: d.awarded, stake: d.stake, multiplier: d.multiplier, revealedCount: d.revealed.length, serverSeed: d.serverSeed, txHash: d.txHash, explorerUrl: d.explorerUrl });
      ST.busy = false;
    } catch { showErr('Network error'); ST.busy = false; actionBtn.disabled = false; }
  };

  function endPanel(d) {
    pTitle.textContent = d.won ? 'CASHED OUT' : 'BOOM';
    pSub.textContent = d.won ? `Banked +${d.awarded} PTS` : `Lost ${d.stake} PTS`;
    pBody.innerHTML = `
      <div class="panel-big ${d.won ? 'green' : 'red'}">${d.won ? `+${d.awarded}` : `-${d.stake}`}</div>
      <div class="panel-row"><span class="lbl">Multiplier</span><span class="val">${d.multiplier.toFixed(2)}x</span></div>
      <div class="panel-row"><span class="lbl">Revealed</span><span class="val">${d.revealedCount}</span></div>
      <div class="panel-row"><span class="lbl">Profit</span><span class="val" style="color:${d.profit >= 0 ? '#5be0a4' : '#ff8a8a'}">${d.profit >= 0 ? '+' : ''}${d.profit} PTS</span></div>
      ${d.explorerUrl ? `<div class="panel-row"><span class="lbl">Tx</span><a class="val" style="color:#5be0a4;text-decoration:underline" href="${d.explorerUrl}" target="_blank" rel="noreferrer">${(d.txHash||'').slice(0,10)}…</a></div>` : ''}
    `;
    postParent({ type: 'litdex:litmines:end', won: d.won, multiplier: d.multiplier, awarded: d.awarded, profit: d.profit, stake: d.stake, txInfo: d.txHash ? { txHash: d.txHash, explorerUrl: d.explorerUrl } : null });
    fetchStats().then((s) => {
      const left = s ? Math.max(0, Number(s.gamesLeft||0)) : 0;
      const bal  = s ? Number(s.pointsBalance||0) : 0;
      ST.gamesLeft = left;
      hudBal.textContent = String(bal);
      btnP.disabled = left <= 0 || bal < STAKE;
      btnP.textContent = left <= 0 ? 'NO GAMES LEFT' : (bal < STAKE ? 'NOT ENOUGH PTS' : `PLAY AGAIN · ${STAKE} PTS`);
      btnP.onclick = (left <= 0 || bal < STAKE) ? () => {} : startRound;
    });
    panel.classList.remove('hidden');
  }

  (async () => {
    if (!wallet) { pTitle.textContent = 'LIT MINES'; pSub.textContent = 'Wallet missing'; pBody.innerHTML = '<div style="color:#ef4956;font-family:JetBrains Mono,monospace;font-size:11px">Open this game from the LitDeX games page.</div>'; btnP.textContent = 'CLOSE'; btnP.onclick = () => postParent({ type: 'litdex:litmines:exit' }); return; }
    buildBoard();
    await showLobby();
  })();
})();
</script>
</body>
</html>
