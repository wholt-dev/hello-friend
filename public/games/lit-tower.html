<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Lit Tower — LitDeX</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #04101e;
    color: #fff;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    font-family: 'Fredoka One', cursive;
  }

  #game-container {
    position: relative;
    width: 100%; height: 100%;
    overflow: hidden;
  }

  canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
  }
  #stage-canvas { z-index: 2; cursor: pointer; }

  /* ── Sky background (CSS, never repaints — ultra cheap) ── */
  #sky {
    position: absolute; inset: 0; z-index: 1;
    background:
      radial-gradient(ellipse 120% 60% at 50% 105%, rgba(255,180,120,0.18) 0%, transparent 60%),
      linear-gradient(180deg,
        #04101e 0%,
        #0a1d35 25%,
        #133a5e 60%,
        #2a6792 90%,
        #4a8db8 100%);
  }
  /* Diagonal rain streaks like the reference */
  #sky::after {
    content: '';
    position: absolute; inset: -20%;
    background-image: repeating-linear-gradient(
      115deg,
      transparent 0,
      transparent 22px,
      rgba(255,255,255,0.045) 22px,
      rgba(255,255,255,0.045) 23px,
      transparent 23px,
      transparent 60px
    );
    pointer-events: none;
    animation: rainShift 14s linear infinite;
  }
  @keyframes rainShift {
    from { transform: translate(0, 0); }
    to   { transform: translate(-60px, 60px); }
  }

  /* ── HUD ── */
  #hud-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 6;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 14px 14px 0;
    pointer-events: none;
    padding-top: max(14px, env(safe-area-inset-top));
  }
  #pause-pill {
    width: 40px; height: 40px;
    background: linear-gradient(180deg, #59c47b, #3aa462);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 0 rgba(0,0,0,0.25), 0 0 0 2px rgba(255,255,255,0.18) inset;
  }
  #pause-pill::before, #pause-pill::after {
    content: ''; display: block;
    width: 5px; height: 16px;
    background: #fff; border-radius: 2px;
    margin: 0 2px;
  }
  #coin-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: linear-gradient(180deg, #f8e1a3, #efb748);
    color: #5a3a0a;
    border-radius: 999px;
    padding: 4px 12px 4px 6px;
    font-family: 'Fredoka One', cursive;
    font-size: 16px; letter-spacing: 0.5px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.22), 0 0 0 2px rgba(255,255,255,0.5) inset;
  }
  .coin-icon {
    width: 26px; height: 26px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 30%, #fff5d2 0%, #ffd76a 35%, #c98b16 80%, #7a4d04 100%);
    display: inline-flex; align-items: center; justify-content: center;
    color: #6a3d04;
    font-family: 'Bangers', cursive; font-size: 16px;
    box-shadow: inset 0 0 0 2px #fff8d6, 0 2px 0 rgba(0,0,0,0.2);
  }
  .coin-icon.add {
    background: radial-gradient(circle at 30% 30%, #f5fff0 0%, #c1f0a3 35%, #4f9a2c 80%, #1f4310 100%);
    color: #1f4310;
    box-shadow: inset 0 0 0 2px #e1ffd0, 0 2px 0 rgba(0,0,0,0.25);
  }

  #score-num {
    position: absolute;
    top: max(64px, calc(64px + env(safe-area-inset-top)));
    right: 18px;
    z-index: 5;
    font-family: 'Bangers', cursive;
    font-size: 64px;
    line-height: 1;
    color: #fff;
    letter-spacing: 4px;
    text-shadow: 2px 4px 0 rgba(0,0,0,0.45), 0 0 18px rgba(255,255,255,0.2);
    pointer-events: none;
    transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #score-num.bump { transform: scale(1.18); }
  #score-num.miss { color: #ff8a8a; text-shadow: 2px 4px 0 rgba(80,0,0,0.5); }

  /* Tap hint */
  #tap-hint {
    position: absolute;
    bottom: 20%;
    left: 0; right: 0;
    text-align: center;
    z-index: 4;
    pointer-events: none;
    font-family: 'Bangers', cursive;
    font-size: clamp(40px, 11vw, 84px);
    letter-spacing: 8px;
    color: #fff;
    text-shadow: 0 2px 0 rgba(0,0,0,0.4), 0 0 28px rgba(255,255,255,0.55);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  #tap-hint.visible { opacity: 1; animation: tapHintPulse 1.1s ease-in-out infinite; }
  @keyframes tapHintPulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.08); }
  }

  /* Combo banner */
  #combo {
    position: absolute;
    left: 50%; top: 26%;
    transform: translate(-50%, 0) scale(0.6);
    z-index: 5;
    font-family: 'Bangers', cursive;
    font-size: clamp(34px, 9vw, 68px);
    letter-spacing: 3px;
    color: #ffe97a;
    text-shadow: 0 3px 0 rgba(0,0,0,0.45), 0 0 24px rgba(255,213,90,0.7);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease;
  }
  #combo.visible {
    transform: translate(-50%, 0) scale(1);
    opacity: 1;
  }

  /* Score popups */
  .score-pop {
    position: absolute;
    z-index: 6;
    font-family: 'Bangers', cursive;
    font-size: 44px;
    letter-spacing: 2px;
    color: #fff;
    text-shadow: 0 3px 0 rgba(0,0,0,0.45);
    pointer-events: none;
    transform: translate(-50%, 0);
    animation: popUp 0.95s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  .score-pop.green { color: #b9ff86; text-shadow: 0 3px 0 rgba(0,80,20,0.55), 0 0 18px rgba(150,255,90,0.45); }
  .score-pop.gold  { color: #ffe97a; text-shadow: 0 3px 0 rgba(80,40,0,0.55), 0 0 22px rgba(255,210,90,0.6); }
  .score-pop.red   { color: #ff8a8a; text-shadow: 0 3px 0 rgba(80,0,0,0.55); }
  @keyframes popUp {
    0%   { transform: translate(-50%, 0) scale(0.6); opacity: 0; }
    25%  { transform: translate(-50%, -20px) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%, -110px) scale(0.95); opacity: 0; }
  }

  /* Center start/restart panel */
  #panel {
    position: absolute;
    inset: 0;
    z-index: 30;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.78);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: opacity 0.3s ease;
  }
  #panel.hidden { opacity: 0; pointer-events: none; }
  .panel-card {
    background: #0a0a0a;
    border: 1px solid #1f1f1f;
    border-radius: 18px;
    padding: 26px 22px;
    text-align: center;
    width: 88%; max-width: 360px;
    color: #fff;
    font-family: 'Fredoka One', cursive;
  }
  .panel-title {
    font-family: 'Bangers', cursive;
    font-size: 38px;
    letter-spacing: 4px;
    margin-bottom: 4px;
    text-shadow: 0 0 18px rgba(62,207,142,0.45);
  }
  .panel-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .panel-stat-row {
    display: flex; justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 6px 0;
  }
  .panel-stat-row .lbl { color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 0.12em; }
  .panel-stat-row .val { color: #fff; font-weight: 700; }
  .panel-big {
    font-family: 'JetBrains Mono', monospace;
    font-size: 44px; line-height: 1;
    font-weight: 700;
    margin: 14px 0 4px;
  }
  .panel-big.green { color: #3ecf8e; }
  .panel-btns { display: flex; gap: 10px; margin-top: 14px; }
  .panel-btn {
    flex: 1;
    min-height: 48px;
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid #333;
    background: transparent;
    color: #fff;
    -webkit-tap-highlight-color: transparent;
  }
  .panel-btn.primary {
    background: #fff; color: #000; border: none;
  }
  .panel-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Camera shake target */
  #shake-host { position: absolute; inset: 0; z-index: 2; will-change: transform; }

  #err-banner {
    position: absolute; top: 12px; left: 50%;
    transform: translateX(-50%);
    background: rgba(239,73,86,0.92);
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.1em;
    padding: 8px 14px; border-radius: 8px;
    z-index: 40;
    opacity: 0; transition: opacity 0.25s ease;
    pointer-events: none;
  }
  #err-banner.visible { opacity: 1; }
</style>
</head>
<body>
<div id="game-container">
  <div id="sky"></div>

  <div id="shake-host">
    <canvas id="stage-canvas"></canvas>
  </div>

  <div id="hud-top">
    <div id="pause-pill" aria-hidden="true"></div>
    <div id="coin-pill">
      <span class="coin-icon add">+</span>
      <span id="coin-num">0</span>
      <span class="coin-icon" style="margin-left:2px">$</span>
    </div>
  </div>
  <div id="score-num">0</div>

  <div id="tap-hint">TAP TO STACK</div>
  <div id="combo">PERFECT</div>

  <div id="panel">
    <div class="panel-card" id="panel-card">
      <div class="panel-title" id="panel-title">LIT TOWER</div>
      <div class="panel-sub" id="panel-sub">Free · 5 games / day · +1 PT each correct stack</div>
      <div id="panel-body"></div>
      <div class="panel-btns">
        <button class="panel-btn primary" id="btn-primary">PLAY</button>
        <button class="panel-btn" id="btn-exit">EXIT</button>
      </div>
    </div>
  </div>

  <div id="err-banner"><span id="err-msg"></span></div>
</div>

<script>
(() => {
  // ── URL params ─────────────────────────────────────────────
  const params  = new URLSearchParams(location.search);
  const wallet  = (params.get('wallet') || '').toLowerCase();
  const auto    = params.get('autostart') === '1';
  const API     = (params.get('api') || 'https://game.test-hub.xyz').replace(/\/$/, '');
  const PARENT_ORIGIN = '*';
  const postParent = (m) => { try { window.parent && window.parent.postMessage(m, PARENT_ORIGIN); } catch {} };

  // ── DOM refs ───────────────────────────────────────────────
  const stageCanvas = document.getElementById('stage-canvas');
  const stage       = stageCanvas.getContext('2d', { alpha: true });
  const panel       = document.getElementById('panel');
  const panelTitle  = document.getElementById('panel-title');
  const panelSub    = document.getElementById('panel-sub');
  const panelBody   = document.getElementById('panel-body');
  const btnPrimary  = document.getElementById('btn-primary');
  const btnExit     = document.getElementById('btn-exit');
  const tapHint     = document.getElementById('tap-hint');
  const errBanner   = document.getElementById('err-banner');
  const errMsg      = document.getElementById('err-msg');
  const scoreNum    = document.getElementById('score-num');
  const coinNum     = document.getElementById('coin-num');
  const comboEl     = document.getElementById('combo');
  const shakeHost   = document.getElementById('shake-host');
  const container   = document.getElementById('game-container');

  // ── Canvas sizing ─────────────────────────────────────────
  let DPR = 1;
  function resize() {
    DPR = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
    const r = stageCanvas.getBoundingClientRect();
    stageCanvas.width  = Math.floor(r.width * DPR);
    stageCanvas.height = Math.floor(r.height * DPR);
    stage.setTransform(1, 0, 0, 1, 0, 0); stage.scale(DPR, DPR);
  }
  window.addEventListener('resize', resize);
  resize();

  function vw() { return stageCanvas.clientWidth; }
  function vh() { return stageCanvas.clientHeight; }

  // ── Audio ─────────────────────────────────────────────────
  let audioCtx = null;
  function tone(freq, durMs, type = 'sine', gain = 0.18) {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type;
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(gain, audioCtx.currentTime + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + durMs / 1000);
      o.connect(g).connect(audioCtx.destination);
      o.start();
      o.stop(audioCtx.currentTime + durMs / 1000);
    } catch {}
  }
  function sndPlace(level) {
    const f = 320 + Math.min(level, 30) * 18;
    tone(f, 70, 'square', 0.13);
    setTimeout(() => tone(f * 1.5, 50, 'square', 0.07), 35);
  }
  function sndPerfect() {
    tone(880, 70, 'square', 0.15);
    setTimeout(() => tone(1320, 90, 'square', 0.13), 60);
    setTimeout(() => tone(1760, 110, 'square', 0.10), 130);
  }
  function sndMiss() {
    tone(180, 320, 'sawtooth', 0.18);
    setTimeout(() => tone(120, 360, 'sawtooth', 0.16), 140);
  }
  function sndCash() {
    tone(523, 70, 'square', 0.14);
    setTimeout(() => tone(659, 70, 'square', 0.14), 80);
    setTimeout(() => tone(784, 140, 'square', 0.16), 160);
  }

  // ── Game constants (premium feel) ─────────────────────────
  const BLOCK_HEIGHT      = 50;
  const BASE_W_FRAC       = 0.62;     // foundation width as fraction of viewport
  const SLIDER_SPEED_BASE = 380;      // px/sec, level 1 (was 130 — much faster now)
  const SLIDER_SPEED_GROW = 16;       // +px/sec per level
  const SLIDER_SPEED_MAX  = 760;      // hard cap so it stays playable
  const PERFECT_TOLERANCE = 6;        // px window for "perfect"
  const MIN_TAP_GAP_MS    = 230;      // matches server >220 floor
  const PALETTE = [
    // [base, accent, window, trim]
    ['#d23a4b', '#ff5c6e', '#7ddff7', '#ffd166'],   // crimson red (matches reference)
    ['#1f7a8c', '#3da7be', '#fff8a8', '#f7c948'],   // teal-blue
    ['#7a2d8f', '#a14cb8', '#a8e6ff', '#ffd166'],   // royal purple
    ['#0f7a4a', '#1ba968', '#ffeb99', '#ff9d3b'],   // emerald
    ['#c2562a', '#e07a45', '#ffe680', '#7ddff7'],   // amber-rust
    ['#264a99', '#3c69c7', '#fff5b3', '#ff9d3b'],   // ocean blue
  ];

  // ── Game state ────────────────────────────────────────────
  const ST = {
    sessionId: null, token: null,
    maxStacks: 100, perPt: 1, gamesLeft: 0,

    blocks: [],          // settled tower (bottom -> top)
    slider: null,        // moving block above the tower top
    debris: [],          // chopped slivers, falling with gravity
    sparks: [],          // perfect-snap sparkle particles

    height: 0,           // count of stacked blocks above the foundation
    awarded: 0,
    combo: 0,            // consecutive perfects
    running: false,
    starting: false,

    taps: [],            // [{t}]
    startedAt: 0,
    lastTapAt: -1e9,

    cameraY: 0,          // current upward shift in CSS pixels
    targetCameraY: 0,
    shakeAmp: 0,
    shakeDecay: 0,
  };

  // ── HUD helpers ───────────────────────────────────────────
  function setScore(n) {
    scoreNum.textContent = String(n);
    scoreNum.classList.remove('bump');
    void scoreNum.offsetWidth;
    scoreNum.classList.add('bump');
  }
  function setCoin(n) { coinNum.textContent = String(n); }

  function showCombo(text) {
    comboEl.textContent = text;
    comboEl.classList.remove('visible');
    void comboEl.offsetWidth;
    comboEl.classList.add('visible');
    clearTimeout(showCombo._t);
    showCombo._t = setTimeout(() => comboEl.classList.remove('visible'), 700);
  }

  function showErr(m) {
    errMsg.textContent = m || 'error';
    errBanner.classList.add('visible');
    setTimeout(() => errBanner.classList.remove('visible'), 2400);
  }

  function popup(text, x, y, kind) {
    const el = document.createElement('div');
    el.className = 'score-pop ' + (kind || 'green');
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    container.appendChild(el);
    setTimeout(() => el.remove(), 950);
  }

  // ── Panel helpers ─────────────────────────────────────────
  function showPanel(title, sub, bodyHTML, primaryLabel, primaryAction) {
    panelTitle.textContent = title;
    panelSub.textContent   = sub;
    panelBody.innerHTML    = bodyHTML || '';
    btnPrimary.textContent = primaryLabel;
    btnPrimary.onclick     = primaryAction;
    panel.classList.remove('hidden');
  }
  function hidePanel() { panel.classList.add('hidden'); }
  btnExit.onclick = () => postParent({ type: 'litdex:littower:exit' });

  // ── Backend wiring ────────────────────────────────────────
  async function fetchStats() {
    if (!wallet) return null;
    try {
      const r = await fetch(`${API}/littower/stats/${wallet}`);
      if (!r.ok) return null;
      return await r.json();
    } catch { return null; }
  }

  async function showLobby() {
    ST.running = false;
    ST.blocks = []; ST.slider = null; ST.debris = []; ST.sparks = [];
    setScore(0); setCoin(0);
    drawStage();

    const stats = await fetchStats();
    const left = stats ? Math.max(0, Number(stats.gamesLeft || 0)) : 5;
    ST.gamesLeft = left;
    const best = stats ? Number(stats.bestHeight || 0) : 0;
    const cap  = stats ? Number(stats.maxPerGame || 100) : 100;

    const noGames = left <= 0;
    const body = `
      <div class="panel-stat-row"><span class="lbl">Reward</span><span class="val">+1 PT / stack</span></div>
      <div class="panel-stat-row"><span class="lbl">Cap / Game</span><span class="val">${cap}</span></div>
      <div class="panel-stat-row"><span class="lbl">Games Today</span><span class="val">${5 - left} / 5</span></div>
      <div class="panel-stat-row"><span class="lbl">Best Height</span><span class="val">${best}</span></div>
    `;
    showPanel(
      'LIT TOWER',
      noGames ? 'Daily limit reached · resets 00:00 IST' : 'Tap the screen to drop the block',
      body,
      noGames ? 'NO GAMES LEFT' : 'PLAY',
      noGames ? () => {} : startGame
    );
    btnPrimary.disabled = noGames;
  }

  async function startGame() {
    if (!wallet) { showErr('No wallet'); return; }
    if (ST.starting) return;
    ST.starting = true;
    btnPrimary.disabled = true;
    btnPrimary.textContent = 'STARTING…';

    try {
      const r = await fetch(`${API}/littower/start`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ wallet }),
      });
      const data = await r.json();
      if (!r.ok || data.error) {
        showErr(data?.error === 'daily_limit_reached' ? 'Daily limit reached' : (data?.error || 'start_failed'));
        ST.starting = false;
        btnPrimary.disabled = false;
        btnPrimary.textContent = 'PLAY';
        return;
      }
      ST.sessionId = data.sessionId;
      ST.token     = data.token;
      ST.maxStacks = Number(data.maxStacks || 100);
      ST.perPt     = Number(data.perCorrectPts || 1);
      ST.gamesLeft = Number(data.gamesLeft || 0);
      initRun();
    } catch (e) {
      showErr('Network error');
      ST.starting = false;
      btnPrimary.disabled = false;
      btnPrimary.textContent = 'PLAY';
    }
  }

  function initRun() {
    ST.starting = false;
    ST.running  = true;
    ST.blocks   = [];
    ST.slider   = null;
    ST.debris   = [];
    ST.sparks   = [];
    ST.height   = 0;
    ST.awarded  = 0;
    ST.combo    = 0;
    ST.taps     = [];
    ST.startedAt = performance.now();
    ST.lastTapAt = -1e9;
    ST.cameraY = 0;
    ST.targetCameraY = 0;
    ST.shakeAmp = 0;

    setScore(0);
    setCoin(0);
    scoreNum.classList.remove('miss');

    // Foundation block — wider, sits on a "ground line"
    const w0 = vw() * BASE_W_FRAC;
    const groundY = vh() - BLOCK_HEIGHT - 24;
    ST.blocks.push({
      x: (vw() - w0) / 2,
      y: groundY,
      w: w0,
      paletteIdx: 0,
      // Per-block landing squash animation state.
      land: 0,
      // Optional rooftop trim ornament every 4th floor.
      trim: false,
    });

    spawnSlider();
    hidePanel();
    tapHint.classList.add('visible');
    setTimeout(() => tapHint.classList.remove('visible'), 1500);
    lastT = 0;
    requestAnimationFrame(loop);
  }

  function spawnSlider() {
    const last = ST.blocks[ST.blocks.length - 1];
    const w = last.w;
    const fromLeft = ST.height % 2 === 0;
    const speed = Math.min(SLIDER_SPEED_MAX, SLIDER_SPEED_BASE + ST.height * SLIDER_SPEED_GROW);
    ST.slider = {
      x: fromLeft ? -w - 10 : vw() + 10,
      y: last.y - BLOCK_HEIGHT,
      w,
      vx: speed,
      dir: fromLeft ? 1 : -1,
      paletteIdx: (last.paletteIdx + 1) % PALETTE.length,
      land: 0,
    };
  }

  // ── Input ─────────────────────────────────────────────────
  function onTap(ev) {
    if (!ST.running) return;
    if (panel.classList && !panel.classList.contains('hidden')) return;

    const now = performance.now();
    if (now - ST.lastTapAt < MIN_TAP_GAP_MS) return;
    ST.lastTapAt = now;

    if (ev) ev.preventDefault?.();
    tapHint.classList.remove('visible');

    const s = ST.slider; if (!s) return;
    const last = ST.blocks[ST.blocks.length - 1];
    if (!last) return;

    ST.taps.push({ t: Math.round(now - ST.startedAt) });

    const ax = Math.max(s.x, last.x);
    const bx = Math.min(s.x + s.w, last.x + last.w);
    const overlap = bx - ax;

    if (overlap <= 0) { onMiss(s); return; }

    const isPerfect =
      Math.abs(s.x - last.x) < PERFECT_TOLERANCE &&
      Math.abs(overlap - last.w) < PERFECT_TOLERANCE;

    let lockedX, lockedW;
    if (isPerfect) {
      lockedX = last.x;
      lockedW = last.w;
    } else {
      lockedX = ax;
      lockedW = overlap;
      // Spawn the chopped piece(s) as falling debris.
      // Left chop: the part of slider that's left of last block.
      if (s.x < last.x) {
        const dw = last.x - s.x;
        if (dw > 0.5) ST.debris.push(makeDebris(s.x, s.y, dw, s.paletteIdx, -1));
      }
      // Right chop: the part of slider right of last block's right edge.
      const lastRight = last.x + last.w;
      const sRight = s.x + s.w;
      if (sRight > lastRight) {
        const dw = sRight - lastRight;
        if (dw > 0.5) ST.debris.push(makeDebris(lastRight, s.y, dw, s.paletteIdx, 1));
      }
    }

    const newBlock = {
      x: lockedX,
      y: s.y,
      w: lockedW,
      paletteIdx: s.paletteIdx,
      land: 1,            // 1 → 0 over ~220ms (squash-spring animation)
      trim: ((ST.height + 1) % 4 === 0),
    };
    ST.blocks.push(newBlock);
    ST.slider = null;
    ST.height++;
    ST.awarded = Math.min(ST.maxStacks, ST.height);

    setScore(ST.height);
    setCoin(ST.awarded);

    if (isPerfect) {
      ST.combo++;
      sndPerfect();
      addShake(4 + Math.min(ST.combo, 5) * 0.6, 320);
      spawnPerfectSparks(newBlock);
      if (ST.combo >= 2) {
        showCombo(`PERFECT x${ST.combo}`);
        const popX = newBlock.x + newBlock.w / 2;
        const popY = newBlock.y + ST.cameraY - 30;
        popup(`COMBO x${ST.combo}`, popX, popY, 'gold');
      } else {
        showCombo('PERFECT');
        const popX = newBlock.x + newBlock.w / 2;
        const popY = newBlock.y + ST.cameraY - 30;
        popup('+1 PERFECT', popX, popY, 'gold');
      }
    } else {
      ST.combo = 0;
      sndPlace(ST.height);
      const popX = newBlock.x + newBlock.w / 2;
      const popY = newBlock.y + ST.cameraY - 24;
      popup(`+${ST.perPt}`, popX, popY, 'green');
    }

    if (ST.height >= ST.maxStacks) {
      setTimeout(() => endGame('cap'), 700);
      return;
    }

    spawnSlider();
  }

  function onMiss(s) {
    sndMiss();
    addShake(8, 420);
    scoreNum.classList.add('miss');
    // Push the entire slider as a falling debris.
    ST.debris.push(makeDebris(s.x, s.y, s.w, s.paletteIdx, s.dir));
    ST.slider = null;
    ST.running = false;
    setTimeout(() => endGame('miss'), 850);
  }

  function makeDebris(x, y, w, paletteIdx, dir) {
    return {
      x, y, w,
      h: BLOCK_HEIGHT,
      paletteIdx,
      vx: (dir || 1) * (60 + Math.random() * 80),
      vy: -120 + Math.random() * 40,
      av: ((Math.random() - 0.5) * 6),
      angle: 0,
      alpha: 1,
    };
  }

  function spawnPerfectSparks(b) {
    const cx = b.x + b.w / 2;
    const cy = b.y + 4;
    for (let i = 0; i < 14; i++) {
      const ang = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI;
      const sp  = 180 + Math.random() * 220;
      ST.sparks.push({
        x: cx, y: cy,
        vx: Math.cos(ang) * sp,
        vy: Math.sin(ang) * sp,
        life: 0.7 + Math.random() * 0.3,
        maxLife: 1.0,
        size: 2 + Math.random() * 3,
        hue: 50 + Math.random() * 30,
      });
    }
  }

  function addShake(amp, durMs) {
    ST.shakeAmp = Math.max(ST.shakeAmp, amp);
    ST.shakeDecay = ST.shakeAmp / (durMs / 1000);
  }

  // ── Loop ──────────────────────────────────────────────────
  let lastT = 0;
  function loop(t) {
    if (!t) t = performance.now();
    if (!lastT) lastT = t;
    const dt = Math.min(0.05, (t - lastT) / 1000);
    lastT = t;

    update(dt);
    drawStage();
    applyShake(dt);

    if (ST.running || ST.debris.length || ST.sparks.length) {
      requestAnimationFrame(loop);
    } else {
      // One last frame to clear debris.
      drawStage();
    }
  }

  function update(dt) {
    // Slider motion.
    const s = ST.slider;
    if (s) {
      s.x += s.vx * s.dir * dt;
      const margin = 4;
      if (s.dir === 1 && s.x + s.w > vw() - margin) {
        s.dir = -1; s.x = vw() - margin - s.w;
      } else if (s.dir === -1 && s.x < margin) {
        s.dir = 1; s.x = margin;
      }
    }

    // Landing squash anim (decay each block's land toward 0).
    for (const b of ST.blocks) {
      if (b.land > 0) b.land = Math.max(0, b.land - dt * 5.5);
    }

    // Camera target: keep top of tower at ~42% of viewport.
    const towerTopY = ST.blocks.length
      ? ST.blocks[ST.blocks.length - 1].y
      : vh();
    const desiredScreenY = vh() * 0.42;
    ST.targetCameraY = Math.max(0, desiredScreenY - towerTopY);
    ST.cameraY += (ST.targetCameraY - ST.cameraY) * Math.min(1, dt * 5.5);

    // Debris physics.
    const G = 1400;
    const aliveDebris = [];
    for (const d of ST.debris) {
      d.vy += G * dt;
      d.x  += d.vx * dt;
      d.y  += d.vy * dt;
      d.angle += d.av * dt;
      d.alpha = Math.max(0, d.alpha - dt * 0.7);
      // Keep alive while inside extended viewport.
      if (d.y - ST.cameraY < vh() + 200 && d.alpha > 0.02) aliveDebris.push(d);
    }
    ST.debris = aliveDebris;

    // Sparks.
    const aliveSparks = [];
    for (const p of ST.sparks) {
      p.vy += 320 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      if (p.life > 0) aliveSparks.push(p);
    }
    ST.sparks = aliveSparks;
  }

  function applyShake(dt) {
    if (ST.shakeAmp > 0) {
      ST.shakeAmp = Math.max(0, ST.shakeAmp - ST.shakeDecay * dt);
      const a = ST.shakeAmp;
      const dx = (Math.random() - 0.5) * 2 * a;
      const dy = (Math.random() - 0.5) * 2 * a;
      shakeHost.style.transform = `translate(${dx.toFixed(2)}px, ${dy.toFixed(2)}px)`;
    } else {
      shakeHost.style.transform = '';
    }
  }

  // ── Render ────────────────────────────────────────────────
  function drawStage() {
    const W = vw(), H = vh();
    stage.clearRect(0, 0, W, H);

    stage.save();
    stage.translate(0, ST.cameraY);

    // Ground line + soft horizon glow under the foundation.
    if (ST.blocks.length) {
      const b0 = ST.blocks[0];
      const groundY = b0.y + BLOCK_HEIGHT;
      // Glow under tower.
      const grd = stage.createRadialGradient(W / 2, groundY + 6, 6, W / 2, groundY + 6, W * 0.55);
      grd.addColorStop(0, 'rgba(255,210,140,0.22)');
      grd.addColorStop(1, 'rgba(255,210,140,0)');
      stage.fillStyle = grd;
      stage.fillRect(0, groundY - 30, W, 80);
      // Hairline ground.
      stage.strokeStyle = 'rgba(255,255,255,0.08)';
      stage.lineWidth = 1;
      stage.beginPath(); stage.moveTo(0, groundY + 0.5); stage.lineTo(W, groundY + 0.5); stage.stroke();
    }

    // Settled tower (oldest at bottom, draw bottom-up so newer can occlude).
    for (let i = 0; i < ST.blocks.length; i++) {
      drawBuilding(ST.blocks[i], false);
    }

    // Slider on top.
    if (ST.slider) drawBuilding(ST.slider, true);

    // Debris.
    for (const d of ST.debris) drawDebris(d);

    // Sparks.
    for (const p of ST.sparks) drawSpark(p);

    stage.restore();
  }

  function drawBuilding(b, isSlider) {
    const pal = PALETTE[b.paletteIdx % PALETTE.length];
    const [base, accent, win, trim] = pal;

    // Squash-spring on landing: scale Y down 8% then back up.
    let drawH = BLOCK_HEIGHT, drawW = b.w;
    let dy = 0;
    if (b.land > 0) {
      const k = b.land;          // 1 (just landed) → 0
      const t = 1 - k;           // 0 → 1
      // ease back: stronger squash at start, settle at end
      const squash = Math.sin(t * Math.PI) * 0.08; // peak 8%
      drawH = BLOCK_HEIGHT * (1 - squash);
      drawW = b.w * (1 + squash * 0.5);
      dy = BLOCK_HEIGHT - drawH;
    }
    const x = b.x - (drawW - b.w) / 2;
    const y = b.y + dy;

    // Drop shadow for slider so it pops against the sky.
    if (isSlider) {
      stage.fillStyle = 'rgba(0,0,0,0.28)';
      roundRect(stage, x + 4, y + drawH - 6, drawW, 8, 4);
      stage.fill();
    }

    // Body.
    const grd = stage.createLinearGradient(x, y, x, y + drawH);
    grd.addColorStop(0, accent);
    grd.addColorStop(0.55, base);
    grd.addColorStop(1, shade(base, -22));
    stage.fillStyle = grd;
    roundRect(stage, x, y, drawW, drawH, 4);
    stage.fill();

    // Top trim line.
    stage.strokeStyle = 'rgba(255,255,255,0.18)';
    stage.lineWidth = 1;
    stage.beginPath();
    stage.moveTo(x + 2, y + 1.5);
    stage.lineTo(x + drawW - 2, y + 1.5);
    stage.stroke();

    // Bottom shadow line.
    stage.strokeStyle = 'rgba(0,0,0,0.35)';
    stage.beginPath();
    stage.moveTo(x + 2, y + drawH - 1);
    stage.lineTo(x + drawW - 2, y + drawH - 1);
    stage.stroke();

    // Vertical edge highlight.
    stage.strokeStyle = 'rgba(255,255,255,0.12)';
    stage.beginPath();
    stage.moveTo(x + 1, y + 2);
    stage.lineTo(x + 1, y + drawH - 2);
    stage.stroke();

    // Windows (count scales with width).
    const winCount = Math.max(1, Math.min(4, Math.round(drawW / 60)));
    const winGap = drawW / (winCount + 1);
    const winW = Math.max(8, Math.min(18, drawW / (winCount * 3.2)));
    const winH = Math.max(12, drawH * 0.55);
    const winY = y + (drawH - winH) / 2;
    for (let i = 1; i <= winCount; i++) {
      const wx = x + winGap * i - winW / 2;
      // Window frame.
      stage.fillStyle = shade(base, -30);
      roundRect(stage, wx - 1.5, winY - 1.5, winW + 3, winH + 3, 3);
      stage.fill();
      // Window glow.
      const wg = stage.createLinearGradient(wx, winY, wx, winY + winH);
      wg.addColorStop(0, lighten(win, 0.12));
      wg.addColorStop(1, win);
      stage.fillStyle = wg;
      roundRect(stage, wx, winY, winW, winH, 3);
      stage.fill();
      // Window mullion (thin vertical line).
      stage.strokeStyle = 'rgba(0,0,0,0.18)';
      stage.lineWidth = 1;
      stage.beginPath();
      stage.moveTo(wx + winW / 2, winY + 1);
      stage.lineTo(wx + winW / 2, winY + winH - 1);
      stage.stroke();
      // Sparkle highlight.
      stage.fillStyle = 'rgba(255,255,255,0.45)';
      stage.fillRect(wx + 1.5, winY + 1.5, Math.max(2, winW * 0.18), 2);
    }

    // Optional rooftop trim every 4th floor (cornice).
    if (b.trim && !isSlider) {
      stage.fillStyle = trim;
      stage.fillRect(x - 2, y - 4, drawW + 4, 4);
      stage.fillStyle = shade(trim, -25);
      stage.fillRect(x - 2, y - 1, drawW + 4, 1);
    }
  }

  function drawDebris(d) {
    const pal = PALETTE[d.paletteIdx % PALETTE.length];
    stage.save();
    stage.globalAlpha = d.alpha;
    stage.translate(d.x + d.w / 2, d.y + d.h / 2);
    stage.rotate(d.angle);
    stage.fillStyle = pal[1];
    roundRect(stage, -d.w / 2, -d.h / 2, d.w, d.h, 3);
    stage.fill();
    stage.fillStyle = 'rgba(0,0,0,0.18)';
    stage.fillRect(-d.w / 2 + 2, d.h / 2 - 3, d.w - 4, 2);
    stage.restore();
  }

  function drawSpark(p) {
    const a = Math.max(0, p.life / p.maxLife);
    stage.save();
    stage.globalAlpha = a;
    stage.fillStyle = `hsl(${p.hue}, 95%, 65%)`;
    stage.shadowColor = `hsl(${p.hue}, 95%, 65%)`;
    stage.shadowBlur = 8;
    stage.beginPath();
    stage.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    stage.fill();
    stage.restore();
  }

  function roundRect(c, x, y, w, h, r) {
    r = Math.max(0, Math.min(r, w / 2, h / 2));
    c.beginPath();
    c.moveTo(x + r, y);
    c.lineTo(x + w - r, y); c.quadraticCurveTo(x + w, y, x + w, y + r);
    c.lineTo(x + w, y + h - r); c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    c.lineTo(x + r, y + h); c.quadraticCurveTo(x, y + h, x, y + h - r);
    c.lineTo(x, y + r); c.quadraticCurveTo(x, y, x + r, y);
    c.closePath();
  }

  // Color helpers (operate on #rrggbb).
  function shade(hex, amt) {
    const c = hex.replace('#', '');
    const r = parseInt(c.substr(0, 2), 16);
    const g = parseInt(c.substr(2, 2), 16);
    const b = parseInt(c.substr(4, 2), 16);
    const adj = (v) => Math.max(0, Math.min(255, v + amt));
    const to = (v) => v.toString(16).padStart(2, '0');
    return '#' + to(adj(r)) + to(adj(g)) + to(adj(b));
  }
  function lighten(hex, t) {
    const c = hex.replace('#', '');
    const r = parseInt(c.substr(0, 2), 16);
    const g = parseInt(c.substr(2, 2), 16);
    const b = parseInt(c.substr(4, 2), 16);
    const lr = Math.round(r + (255 - r) * t);
    const lg = Math.round(g + (255 - g) * t);
    const lb = Math.round(b + (255 - b) * t);
    const to = (v) => v.toString(16).padStart(2, '0');
    return '#' + to(lr) + to(lg) + to(lb);
  }

  // ── End game ──────────────────────────────────────────────
  async function endGame(reason) {
    ST.running = false;
    let resp = null;
    try {
      const r = await fetch(`${API}/littower/end`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sessionId: ST.sessionId,
          token:     ST.token,
          taps:      ST.taps,
        }),
      });
      resp = await r.json();
      if (!r.ok || resp.error) {
        showErr(resp?.reason || resp?.error || 'end_failed');
      }
    } catch {
      showErr('Network error');
    }

    const awarded = Number(resp?.awarded ?? ST.awarded ?? 0);
    const height  = Number(resp?.height  ?? ST.height  ?? 0);
    const best    = Number(resp?.bestHeight ?? 0);

    if (awarded > 0) sndCash();

    postParent({
      type: 'litdex:littower:end',
      reason: reason === 'cap' ? 'cap' : 'miss',
      height, awarded, best,
    });

    const stats = await fetchStats();
    const left  = stats ? Math.max(0, Number(stats.gamesLeft || 0)) : 0;
    ST.gamesLeft = left;

    const body = `
      <div class="panel-big green">+${awarded} PTS</div>
      <div class="panel-stat-row"><span class="lbl">Height</span><span class="val">${height}</span></div>
      <div class="panel-stat-row"><span class="lbl">Best</span><span class="val">${best}</span></div>
      <div class="panel-stat-row"><span class="lbl">Cap</span><span class="val">${ST.maxStacks}</span></div>
    `;
    panelTitle.textContent = reason === 'cap' ? 'TOWER MAXED' : 'TOWER FELL';
    panelSub.textContent   = reason === 'cap' ? 'Daily cap hit on this run.' : 'Better luck next stack.';
    panelBody.innerHTML    = body;
    btnPrimary.disabled    = left <= 0;
    btnPrimary.textContent = left <= 0 ? 'NO GAMES LEFT' : 'PLAY AGAIN';
    btnPrimary.onclick     = left <= 0 ? () => {} : startGame;
    panel.classList.remove('hidden');
  }

  // ── Input wiring ──────────────────────────────────────────
  // Use pointerdown for instant response, capture on the whole container
  // (anywhere in playfield is tappable) but ignore taps when panel is up.
  function tapHandler(e) { onTap(e); }
  container.addEventListener('pointerdown', tapHandler);
  container.addEventListener('touchstart',  (e) => { tapHandler(e); }, { passive: false });
  // Keyboard accessibility.
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'Enter') {
      if (!panel.classList.contains('hidden')) return;
      e.preventDefault();
      onTap();
    }
  });

  // Prevent the start panel buttons from also triggering a stage tap.
  ['btn-primary', 'btn-exit'].forEach((id) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('pointerdown', (e) => e.stopPropagation());
    el.addEventListener('touchstart',  (e) => e.stopPropagation());
  });

  // ── Boot ──────────────────────────────────────────────────
  (async () => {
    if (!wallet) {
      showPanel(
        'LIT TOWER',
        'Wallet missing',
        '<div style="color:#ef4956;font-family:JetBrains Mono,monospace;font-size:11px">Open this game from the LitDeX games page.</div>',
        'CLOSE',
        () => postParent({ type: 'litdex:littower:exit' })
      );
      return;
    }
    // Always show the in-iframe lobby — the player MUST tap PLAY
    // before the round starts. Auto-start is intentionally disabled
    // so the parent's "START" only opens the play surface, then the
    // iframe lobby PLAY mints the session.
    await showLobby();
  })();
})();
</script>
</body>
</html>
