<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Lit Launch — LitDeX</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #050912;
    color: #fff;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    font-family: 'Fredoka One', cursive;
  }

  #game-container {
    position: relative;
    width: 100%; height: 100%;
    overflow: hidden;
    background:
      radial-gradient(ellipse 100% 40% at 50% 100%, #244169 0%, #0c1a30 30%, transparent 65%),
      radial-gradient(ellipse 80% 60% at 50% 0%, #050918 0%, transparent 70%),
      linear-gradient(180deg, #04060c 0%, #0a1226 50%, #1d3856 100%);
  }

  canvas {
    position: absolute; left: 0; top: 0;
    width: 100%; height: 100%;
    display: block;
    touch-action: none;
  }
  #stage-canvas { z-index: 2; }

  /* HUD */
  #hud-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 6;
    padding: 14px 12px 0;
    padding-top: max(14px, env(safe-area-inset-top));
    pointer-events: none;
    display: flex; justify-content: space-between; gap: 10px;
    align-items: flex-start;
  }
  .hud-pill {
    flex: 1;
    background: linear-gradient(180deg, rgba(15,25,45,0.95), rgba(5,10,20,0.92));
    border: 1px solid rgba(140,180,255,0.18);
    border-radius: 12px;
    padding: 7px 10px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.16em;
    color: #aac6ee;
    text-transform: uppercase;
    backdrop-filter: blur(6px);
    text-align: center;
  }
  .hud-pill .v {
    display: block;
    color: #fff;
    font-weight: 700;
    font-size: 16px;
    margin-top: 3px;
    letter-spacing: 0.5px;
  }
  .hud-pill.score { background: linear-gradient(180deg, rgba(255,213,90,0.25), rgba(120,80,15,0.4)); border-color: rgba(255,213,90,0.5); color: #ffe9bf; }
  .hud-pill.score .v { color: #ffe97a; font-size: 22px; text-shadow: 0 0 12px rgba(255,213,90,0.5); }
  .hud-pill.lives  { background: linear-gradient(180deg, rgba(255,90,120,0.25), rgba(80,15,40,0.4)); border-color: rgba(255,138,168,0.45); color: #ffd2dc; }
  .hud-pill.lives .v { color: #ff8a8a; font-size: 18px; }
  .hud-pill.spd    { background: linear-gradient(180deg, rgba(91,224,164,0.22), rgba(20,80,50,0.4)); border-color: rgba(91,224,164,0.45); color: #d2ffe2; }
  .hud-pill.spd .v { color: #5be0a4; }

  /* 3-2-1-GO countdown overlay */
  #countdown {
    position: absolute;
    inset: 0;
    z-index: 8;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(2px);
    transition: opacity 0.25s ease;
    pointer-events: none;
  }
  #countdown.hidden { opacity: 0; }
  #countdown-num {
    font-family: 'Bangers', cursive;
    font-size: clamp(120px, 28vw, 280px);
    line-height: 1.2;
    color: #fff;
    text-shadow: 0 6px 0 rgba(0,0,0,0.45), 0 0 36px rgba(140,200,255,0.5);
    letter-spacing: 6px;
    animation: cdPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    padding: 0 24px;
  }
  #countdown-num.go {
    color: #5be0a4;
    font-size: clamp(70px, 14vw, 160px);
    letter-spacing: 8px;
    text-shadow: 0 6px 0 rgba(0,40,20,0.5), 0 0 36px rgba(91,224,164,0.7);
  }
  @keyframes cdPop {
    0%   { transform: scale(0.4); opacity: 0; }
    25%  { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Bottom hint while playing */
  #move-hint {
    position: absolute;
    bottom: 36px; left: 0; right: 0;
    z-index: 5;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  #move-hint.visible { opacity: 1; }

  /* Score popups */
  .score-pop {
    position: absolute;
    z-index: 7;
    font-family: 'Bangers', cursive;
    font-size: 30px; letter-spacing: 2px;
    color: #ffe97a;
    text-shadow: 0 3px 0 rgba(60,30,0,0.55), 0 0 22px rgba(255,213,90,0.55);
    pointer-events: none;
    transform: translate(-50%, 0);
    animation: popUp 0.95s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  .score-pop.green { color: #5be0a4; text-shadow: 0 3px 0 rgba(0,40,20,0.55), 0 0 22px rgba(91,224,164,0.6); }
  .score-pop.red   { color: #ff8a8a; text-shadow: 0 3px 0 rgba(80,0,0,0.55); }
  @keyframes popUp {
    0%   { transform: translate(-50%, 0) scale(0.6); opacity: 0; }
    25%  { transform: translate(-50%, -22px) scale(1.18); opacity: 1; }
    100% { transform: translate(-50%, -110px) scale(0.95); opacity: 0; }
  }

  /* Panel (start / end) */
  #panel {
    position: absolute;
    inset: 0;
    z-index: 30;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.78);
    backdrop-filter: blur(6px);
    transition: opacity 0.3s ease;
  }
  #panel.hidden { opacity: 0; pointer-events: none; }
  .panel-card {
    background: #0a0e1a;
    border: 1px solid #1f2638;
    border-radius: 18px;
    padding: 26px 22px;
    text-align: center;
    width: 88%; max-width: 360px;
    color: #fff;
    font-family: 'Fredoka One', cursive;
  }
  .panel-title {
    font-family: 'Bangers', cursive;
    font-size: 38px;
    letter-spacing: 4px;
    margin-bottom: 4px;
    text-shadow: 0 0 18px rgba(140,200,255,0.4);
  }
  .panel-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .panel-stat-row {
    display: flex; justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 6px 0;
  }
  .panel-stat-row .lbl { color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 0.12em; }
  .panel-stat-row .val { color: #fff; font-weight: 700; }
  .panel-big {
    font-family: 'JetBrains Mono', monospace;
    font-size: 44px; line-height: 1;
    font-weight: 700;
    margin: 14px 0 4px;
  }
  .panel-big.green  { color: #5be0a4; }
  .panel-big.gold   { color: #ffe97a; }
  .panel-btns { display: flex; gap: 10px; margin-top: 14px; }
  .panel-btn {
    flex: 1; min-height: 48px; border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid #333;
    background: transparent;
    color: #fff;
    -webkit-tap-highlight-color: transparent;
  }
  .panel-btn.primary { background: #fff; color: #000; border: none; }
  .panel-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Camera shake target */
  #shake-host { position: absolute; inset: 0; z-index: 2; will-change: transform; }

  #err-banner {
    position: absolute; top: 12px; left: 50%;
    transform: translateX(-50%);
    background: rgba(239,73,86,0.92);
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.1em;
    padding: 8px 14px; border-radius: 8px;
    z-index: 40;
    opacity: 0; transition: opacity 0.25s ease;
    pointer-events: none;
  }
  #err-banner.visible { opacity: 1; }
</style>
</head>
<body>
<div id="game-container">
  <div id="shake-host">
    <canvas id="stage-canvas"></canvas>
  </div>

  <div id="hud-top">
    <div class="hud-pill score">SCORE<span class="v" id="hud-score">0</span></div>
    <div class="hud-pill lives">LIVES<span class="v" id="hud-lives">❤️❤️❤️</span></div>
    <div class="hud-pill spd">SPEED<span class="v" id="hud-speed">1.0x</span></div>
  </div>

  <div id="countdown" class="hidden">
    <div id="countdown-num">3</div>
  </div>

  <div id="move-hint">DRAG OR SWIPE LEFT/RIGHT TO STEER</div>

  <div id="panel">
    <div class="panel-card" id="panel-card">
      <div class="panel-title" id="panel-title">LIT LAUNCH</div>
      <div class="panel-sub" id="panel-sub">Dodge asteroids · catch coins · 3 lives</div>
      <div id="panel-body"></div>
      <div class="panel-btns">
        <button class="panel-btn primary" id="btn-primary">PLAY</button>
        <button class="panel-btn" id="btn-exit">EXIT</button>
      </div>
    </div>
  </div>

  <div id="err-banner"><span id="err-msg"></span></div>
</div>
<script>
(() => {
  // ── URL params ─────────────────────────────────────────────
  const params  = new URLSearchParams(location.search);
  const wallet  = (params.get('wallet') || '').toLowerCase();
  const API     = (params.get('api') || 'https://game.test-hub.xyz').replace(/\/$/, '');
  const PARENT_ORIGIN = '*';
  const postParent = (m) => { try { window.parent && window.parent.postMessage(m, PARENT_ORIGIN); } catch {} };

  // ── DOM ────────────────────────────────────────────────────
  const stageCanvas = document.getElementById('stage-canvas');
  const stage       = stageCanvas.getContext('2d', { alpha: true });
  const panel       = document.getElementById('panel');
  const panelTitle  = document.getElementById('panel-title');
  const panelSub    = document.getElementById('panel-sub');
  const panelBody   = document.getElementById('panel-body');
  const btnPrimary  = document.getElementById('btn-primary');
  const btnExit     = document.getElementById('btn-exit');
  const errBanner   = document.getElementById('err-banner');
  const errMsg      = document.getElementById('err-msg');
  const hudScore    = document.getElementById('hud-score');
  const hudLives    = document.getElementById('hud-lives');
  const hudSpeed    = document.getElementById('hud-speed');
  const countdown   = document.getElementById('countdown');
  const cdNum       = document.getElementById('countdown-num');
  const moveHint    = document.getElementById('move-hint');
  const shakeHost   = document.getElementById('shake-host');
  const container   = document.getElementById('game-container');

  // ── Constants ──────────────────────────────────────────────
  const MAX_LIVES         = 3;
  const MAX_COINS         = 50;
  const PERFECT_HIT_BONUS = 0;
  const ROCKET_W          = 38;        // CSS px
  const ROCKET_H          = 56;
  const ROCKET_SPEED_BASE = 280;       // px/sec horizontal slide
  const SCROLL_BASE_PXS   = 220;       // world scroll velocity (px/s of "rising") at speed 1.0
  const SCROLL_GROW_PER_S = 9;         // +px/s every second
  const SCROLL_MAX_PXS    = 600;
  const ASTEROID_BASE_HZ  = 1.4;       // spawns / sec at start
  const ASTEROID_GROW_HZ  = 0.04;      // additional per second
  const COIN_BASE_HZ      = 1.6;
  const COIN_GROW_HZ      = 0.02;
  const LANE_PADDING      = 36;
  const MIN_TAP_GAP_MS    = 90;        // matches >80 ms backend floor

  // ── Canvas sizing ─────────────────────────────────────────
  let DPR = 1;
  function resize() {
    DPR = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
    const r = container.getBoundingClientRect();
    stageCanvas.style.width  = r.width + 'px';
    stageCanvas.style.height = r.height + 'px';
    stageCanvas.width  = Math.floor(r.width * DPR);
    stageCanvas.height = Math.floor(r.height * DPR);
    stage.setTransform(1, 0, 0, 1, 0, 0); stage.scale(DPR, DPR);
  }
  window.addEventListener('resize', resize);
  resize();
  function vw() { return container.clientWidth; }
  function vh() { return container.clientHeight; }

  // ── Audio ─────────────────────────────────────────────────
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  function tone(freq, durMs, type = 'sine', gain = 0.16) {
    try {
      ensureAudio();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type;
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(gain, audioCtx.currentTime + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + durMs / 1000);
      o.connect(g).connect(audioCtx.destination);
      o.start();
      o.stop(audioCtx.currentTime + durMs / 1000);
    } catch {}
  }
  function sndCoin()    { tone(880, 60, 'square', 0.15); setTimeout(() => tone(1320, 80, 'square', 0.13), 50); }
  function sndHit()     { tone(120, 320, 'sawtooth', 0.20); setTimeout(() => tone(80, 280, 'sawtooth', 0.16), 100); }
  function sndGameOver(){ tone(180, 420, 'sawtooth', 0.20); setTimeout(() => tone(110, 520, 'sawtooth', 0.18), 240); }
  function sndCount(big){ tone(big ? 880 : 660, 100, 'square', 0.16); }
  function sndIgnite()  { tone(110, 220, 'sawtooth', 0.20); setTimeout(() => tone(60, 320, 'sawtooth', 0.18), 100); }

  // ── Game state ────────────────────────────────────────────
  const PHASE_LOBBY = 'lobby', PHASE_COUNT = 'count', PHASE_FLIGHT = 'flight', PHASE_END = 'end';
  const ST = {
    sessionId: null, token: null, serverSeed: null,
    phase: PHASE_LOBBY,
    starting: false,
    gamesLeft: 0,

    score: 0,
    hits: 0,
    speedMul: 1.0,                  // grows over time
    elapsedMs: 0,
    runStartT: 0,
    spawnAcc: { ast: 0, coin: 0 },

    rocket: { x: 0, y: 0, targetX: 0, vx: 0 },
    asteroids: [],                  // {x,y, vx, vy, r, rot, vrot, color, hit:false}
    coins: [],                      // {x,y, vy, r, twirl}
    sparks: [],
    trail: [],
    parallax: { far: [], mid: [], near: [] },

    taps: [],                       // [{t}] — pointer movement events for anti-bot
    lastTapAt: -1e9,

    invulMs: 0,                     // brief invul after taking a hit
    flashMs: 0,                     // red flash on hit
    shakeAmp: 0, shakeDecay: 0,

    // Server-seeded RNG state for spawns; seed is mixed with elapsed time.
    seedHash: 0,
  };

  // ── Helpers ───────────────────────────────────────────────
  function showErr(m) {
    errMsg.textContent = m || 'error';
    errBanner.classList.add('visible');
    setTimeout(() => errBanner.classList.remove('visible'), 2400);
  }
  function popup(text, x, y, kind) {
    const el = document.createElement('div');
    el.className = 'score-pop ' + (kind || '');
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    container.appendChild(el);
    setTimeout(() => el.remove(), 950);
  }
  function showPanel(title, sub, bodyHTML, primaryLabel, primaryAction) {
    panelTitle.textContent = title;
    panelSub.textContent   = sub;
    panelBody.innerHTML    = bodyHTML || '';
    btnPrimary.textContent = primaryLabel;
    btnPrimary.onclick     = primaryAction;
    panel.classList.remove('hidden');
  }
  function hidePanel() { panel.classList.add('hidden'); }
  btnExit.onclick = () => postParent({ type: 'litdex:litlaunch:exit' });

  function updateHud() {
    hudScore.textContent = String(ST.score);
    hudLives.textContent = '❤️'.repeat(Math.max(0, MAX_LIVES - ST.hits));
    hudSpeed.textContent = ST.speedMul.toFixed(1) + 'x';
  }
  function addShake(amp, durMs) {
    ST.shakeAmp = Math.max(ST.shakeAmp, amp);
    ST.shakeDecay = ST.shakeAmp / (durMs / 1000);
  }

  // tiny xorshift seeded by serverSeed string — used so any
  // post-mortem replay matches; here it just drives spawns.
  let _rng = 1;
  function seedRng(seedStr) {
    let h = 2166136261;
    for (let i = 0; i < seedStr.length; i++) {
      h ^= seedStr.charCodeAt(i);
      h = Math.imul(h, 16777619) >>> 0;
    }
    _rng = h || 1;
  }
  function rng() {
    let x = _rng | 0;
    x ^= x << 13; x ^= x >>> 17; x ^= x << 5;
    _rng = x | 0;
    return ((x >>> 0) % 100000) / 100000;
  }

  // ── Backend wiring ────────────────────────────────────────
  async function fetchStats() {
    if (!wallet) return null;
    try {
      const r = await fetch(`${API}/litlaunch/stats/${wallet}`);
      if (!r.ok) return null;
      return await r.json();
    } catch { return null; }
  }

  async function showLobby() {
    ST.phase = PHASE_LOBBY;
    ST.score = 0; ST.hits = 0; ST.speedMul = 1.0; ST.elapsedMs = 0;
    ST.asteroids = []; ST.coins = []; ST.sparks = []; ST.trail = [];
    ST.invulMs = 0; ST.flashMs = 0; ST.shakeAmp = 0; ST.taps = [];
    initParallax();
    initRocket();
    updateHud();
    countdown.classList.add('hidden');
    moveHint.classList.remove('visible');
    drawStage();

    const stats = await fetchStats();
    const left = stats ? Math.max(0, Number(stats.gamesLeft || 0)) : 5;
    ST.gamesLeft = left;
    const best = stats ? Number(stats.bestScore || 0) : 0;

    const noGames = left <= 0;
    const body = `
      <div class="panel-stat-row"><span class="lbl">Reward</span><span class="val">+1 PT / coin</span></div>
      <div class="panel-stat-row"><span class="lbl">Lives</span><span class="val">${MAX_LIVES}</span></div>
      <div class="panel-stat-row"><span class="lbl">Cap / Game</span><span class="val">${MAX_COINS} PTS</span></div>
      <div class="panel-stat-row"><span class="lbl">Games Today</span><span class="val">${5 - left} / 5</span></div>
      <div class="panel-stat-row"><span class="lbl">Best Score</span><span class="val">${best} PTS</span></div>
    `;
    showPanel(
      'LIT LAUNCH',
      noGames ? 'Daily limit reached · resets 00:00 IST'
              : 'Drag left/right · dodge asteroids · catch coins',
      body,
      noGames ? 'NO GAMES LEFT' : 'PLAY',
      noGames ? () => {} : startGame
    );
    btnPrimary.disabled = noGames;
  }

  async function startGame() {
    if (!wallet) { showErr('No wallet'); return; }
    if (ST.starting) return;
    ST.starting = true;
    btnPrimary.disabled = true;
    btnPrimary.textContent = 'STARTING…';

    try {
      const r = await fetch(`${API}/litlaunch/start`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ wallet }),
      });
      const data = await r.json();
      if (!r.ok || data.error) {
        showErr(data?.error === 'daily_limit_reached' ? 'Daily limit reached' : (data?.error || 'start_failed'));
        ST.starting = false;
        btnPrimary.disabled = false;
        btnPrimary.textContent = 'PLAY';
        return;
      }
      ST.sessionId = data.sessionId;
      ST.token     = data.token;
      ST.serverSeed = data.serverSeed;
      ST.gamesLeft  = Number(data.gamesLeft || 0);
      seedRng(ST.serverSeed + ':' + ST.sessionId);
      hidePanel();
      runCountdown();
    } catch (e) {
      showErr('Network error');
      ST.starting = false;
      btnPrimary.disabled = false;
      btnPrimary.textContent = 'PLAY';
    }
  }

  // ── Init helpers ──────────────────────────────────────────
  function initParallax() {
    ST.parallax = { far: [], mid: [], near: [] };
    for (let i = 0; i < 70; i++) {
      ST.parallax.far.push({
        x: Math.random() * vw(),
        y: Math.random() * vh(),
        r: 0.5 + Math.random() * 0.7,
        tw: 0.3 + Math.random() * 0.7,
      });
    }
    for (let i = 0; i < 30; i++) {
      ST.parallax.mid.push({
        x: Math.random() * vw(),
        y: Math.random() * vh(),
        r: 0.7 + Math.random() * 1.0,
        tw: 0.3 + Math.random() * 0.7,
      });
    }
    for (let i = 0; i < 14; i++) {
      ST.parallax.near.push({
        x: Math.random() * vw(),
        y: Math.random() * vh(),
        r: 1.0 + Math.random() * 1.4,
        tw: 0.4 + Math.random() * 0.6,
      });
    }
  }

  function initRocket() {
    ST.rocket.x = vw() / 2;
    ST.rocket.targetX = vw() / 2;
    ST.rocket.y = vh() - ROCKET_H * 1.4 - 24;
    ST.rocket.vx = 0;
  }

  // ── Countdown ─────────────────────────────────────────────
  async function runCountdown() {
    ST.starting = false;
    ST.phase = PHASE_COUNT;
    initParallax();
    initRocket();
    countdown.classList.remove('hidden');
    const steps = [
      { text: '3',  go: false, ms: 700 },
      { text: '2',  go: false, ms: 700 },
      { text: '1',  go: false, ms: 700 },
      { text: 'GO', go: true,  ms: 500 },
    ];
    for (const step of steps) {
      cdNum.classList.remove('go');
      cdNum.style.animation = 'none';
      void cdNum.offsetWidth;
      cdNum.textContent = step.text;
      if (step.go) cdNum.classList.add('go');
      cdNum.style.animation = '';
      sndCount(step.go);
      await new Promise(r => setTimeout(r, step.ms));
    }
    countdown.classList.add('hidden');
    enterFlight();
  }

  function enterFlight() {
    ST.phase = PHASE_FLIGHT;
    ST.score = 0;
    ST.hits  = 0;
    ST.speedMul = 1.0;
    ST.elapsedMs = 0;
    ST.runStartT = performance.now();
    ST.spawnAcc = { ast: 0, coin: 0 };
    ST.asteroids = []; ST.coins = []; ST.sparks = []; ST.trail = [];
    ST.taps = [];
    ST.invulMs = 0; ST.flashMs = 0;
    sndIgnite();
    addShake(6, 320);
    moveHint.classList.add('visible');
    setTimeout(() => moveHint.classList.remove('visible'), 1800);
    updateHud();
    lastT = 0;
    requestAnimationFrame(loop);
  }

  // ── Input ─────────────────────────────────────────────────
  // Drag/swipe sets target X; rocket eases toward it. Anywhere on
  // screen is valid input — we listen on the container so the player
  // doesn't have to aim at the rocket itself.
  let dragging = false;
  function inputCoords(e) {
    const cx = e.clientX ?? e.touches?.[0]?.clientX ?? e.changedTouches?.[0]?.clientX;
    return cx != null ? cx : null;
  }
  function onDown(e) {
    if (ST.phase !== PHASE_FLIGHT) return;
    e.preventDefault?.();
    const cx = inputCoords(e);
    if (cx == null) return;
    dragging = true;
    setTargetX(cx);
    recordTap();
  }
  function onMove(e) {
    if (!dragging || ST.phase !== PHASE_FLIGHT) return;
    e.preventDefault?.();
    const cx = inputCoords(e);
    if (cx == null) return;
    setTargetX(cx);
    recordTap();
  }
  function onUp(e) {
    dragging = false;
  }
  function setTargetX(clientX) {
    const r = container.getBoundingClientRect();
    let x = clientX - r.left;
    x = Math.max(LANE_PADDING + ROCKET_W / 2, Math.min(vw() - LANE_PADDING - ROCKET_W / 2, x));
    ST.rocket.targetX = x;
  }
  function recordTap() {
    const now = performance.now();
    if (now - ST.lastTapAt < MIN_TAP_GAP_MS) return;
    ST.lastTapAt = now;
    if (ST.taps.length < 600) ST.taps.push({ t: Math.round(now - ST.runStartT) });
  }

  container.addEventListener('pointerdown', onDown);
  container.addEventListener('pointermove', onMove);
  container.addEventListener('pointerup',   onUp);
  container.addEventListener('pointercancel', onUp);
  container.addEventListener('touchstart', onDown, { passive: false });
  container.addEventListener('touchmove',  onMove, { passive: false });
  container.addEventListener('touchend',   onUp,   { passive: false });
  // Stop panel buttons from leaking into game.
  ['btn-primary','btn-exit'].forEach((id) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('pointerdown', (e) => e.stopPropagation());
    el.addEventListener('touchstart',  (e) => e.stopPropagation());
  });
  // Keyboard: Arrow keys move target by a step.
  window.addEventListener('keydown', (e) => {
    if (ST.phase !== PHASE_FLIGHT) return;
    if (e.key === 'ArrowLeft')  { ST.rocket.targetX = Math.max(LANE_PADDING + ROCKET_W/2, ST.rocket.targetX - 60); recordTap(); }
    if (e.key === 'ArrowRight') { ST.rocket.targetX = Math.min(vw() - LANE_PADDING - ROCKET_W/2, ST.rocket.targetX + 60); recordTap(); }
  });

  // ── Spawning ──────────────────────────────────────────────
  function spawnAsteroid() {
    const x = LANE_PADDING + 20 + rng() * (vw() - LANE_PADDING * 2 - 40);
    const r = 14 + rng() * 18;
    const baseV = 220 + rng() * 110;
    ST.asteroids.push({
      x, y: -r - 10,
      vx: (rng() - 0.5) * 60,
      vy: baseV + ST.speedMul * 60,
      r,
      rot: rng() * Math.PI * 2,
      vrot: (rng() - 0.5) * 4,
      hue: 18 + rng() * 14,
      hit: false,
    });
  }
  function spawnCoin() {
    const x = LANE_PADDING + 20 + rng() * (vw() - LANE_PADDING * 2 - 40);
    ST.coins.push({
      x, y: -18,
      vx: (rng() - 0.5) * 30,
      vy: 200 + rng() * 80 + ST.speedMul * 40,
      r: 12,
      twirl: rng() * Math.PI * 2,
    });
  }

  // ── Loop ──────────────────────────────────────────────────
  let lastT = 0;
  function loop(t) {
    if (!t) t = performance.now();
    if (!lastT) lastT = t;
    const dt = Math.min(0.05, (t - lastT) / 1000);
    lastT = t;

    if (ST.phase === PHASE_FLIGHT) update(dt);
    drawStage();
    applyShake();
    if (ST.phase === PHASE_FLIGHT || ST.sparks.length > 0) requestAnimationFrame(loop);
  }

  function update(dt) {
    ST.elapsedMs += dt * 1000;
    ST.speedMul = Math.min(SCROLL_MAX_PXS / SCROLL_BASE_PXS,
                           1.0 + (ST.elapsedMs / 1000) * (SCROLL_GROW_PER_S / SCROLL_BASE_PXS));

    // Rocket easing toward targetX.
    const dx = ST.rocket.targetX - ST.rocket.x;
    ST.rocket.x += Math.sign(dx) * Math.min(Math.abs(dx), ROCKET_SPEED_BASE * (1 + ST.speedMul * 0.4) * dt);

    // Spawn schedule.
    const astHz  = ASTEROID_BASE_HZ + ST.elapsedMs / 1000 * ASTEROID_GROW_HZ;
    const coinHz = COIN_BASE_HZ     + ST.elapsedMs / 1000 * COIN_GROW_HZ;
    ST.spawnAcc.ast  += dt * astHz;
    ST.spawnAcc.coin += dt * coinHz;
    while (ST.spawnAcc.ast >= 1)  { ST.spawnAcc.ast  -= 1; spawnAsteroid(); }
    while (ST.spawnAcc.coin >= 1) { ST.spawnAcc.coin -= 1; spawnCoin(); }

    // Update asteroids.
    const aliveAst = [];
    for (const a of ST.asteroids) {
      a.x += a.vx * dt;
      a.y += a.vy * dt;
      a.rot += a.vrot * dt;
      // Bounce off side walls so they stay on the playfield.
      if (a.x < LANE_PADDING + a.r) { a.x = LANE_PADDING + a.r; a.vx = Math.abs(a.vx); }
      if (a.x > vw() - LANE_PADDING - a.r) { a.x = vw() - LANE_PADDING - a.r; a.vx = -Math.abs(a.vx); }
      if (a.y - a.r > vh() + 60) continue; // off bottom — drop
      // Collision with rocket (when not invulnerable).
      if (ST.invulMs <= 0 && circleHitsRocket(a)) {
        a.hit = true;
        registerHit(a);
        continue;
      }
      aliveAst.push(a);
    }
    ST.asteroids = aliveAst;

    // Update coins.
    const aliveCoins = [];
    for (const c of ST.coins) {
      c.x += c.vx * dt;
      c.y += c.vy * dt;
      c.twirl += dt * 4;
      if (c.x < LANE_PADDING + c.r) { c.x = LANE_PADDING + c.r; c.vx = Math.abs(c.vx); }
      if (c.x > vw() - LANE_PADDING - c.r) { c.x = vw() - LANE_PADDING - c.r; c.vx = -Math.abs(c.vx); }
      if (c.y - c.r > vh() + 30) continue;
      if (circleHitsRocket(c)) {
        registerCoin(c);
        continue;
      }
      aliveCoins.push(c);
    }
    ST.coins = aliveCoins;

    // Engine trail.
    ST.trail.push({
      x: ST.rocket.x + (Math.random() - 0.5) * 8,
      y: ST.rocket.y + ROCKET_H * 0.55,
      life: 0.45, maxLife: 0.45,
      size: 4 + Math.random() * 4,
      hue: 25 + Math.random() * 30,
      vy: 90 + Math.random() * 60,
    });

    // Trail / spark physics.
    const aliveTrail = [];
    for (const p of ST.trail) {
      p.life -= dt;
      p.y += p.vy * dt;
      p.size *= (1 - dt * 1.4);
      if (p.life > 0 && p.size > 0.5) aliveTrail.push(p);
    }
    ST.trail = aliveTrail;

    const aliveSparks = [];
    for (const p of ST.sparks) {
      p.vy += 220 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      if (p.life > 0) aliveSparks.push(p);
    }
    ST.sparks = aliveSparks;

    if (ST.invulMs > 0) ST.invulMs -= dt * 1000;
    if (ST.flashMs > 0) ST.flashMs -= dt * 1000;

    updateHud();

    // Hit cap or 3 lives gone -> end.
    if (ST.score >= MAX_COINS || ST.hits >= MAX_LIVES) {
      endGame(ST.hits >= MAX_LIVES ? 'gameover' : 'cap');
    }
  }

  function circleHitsRocket(o) {
    // Approximate rocket as a circle slightly smaller than its body.
    const R = ROCKET_W * 0.45;
    const dx = o.x - ST.rocket.x;
    const dy = o.y - ST.rocket.y;
    return (dx * dx + dy * dy) <= (R + o.r) * (R + o.r);
  }

  function registerCoin(c) {
    ST.score = Math.min(MAX_COINS, ST.score + 1);
    sndCoin();
    popup('+1', c.x, c.y - 6, 'gold');
    // Spawn small sparkles.
    for (let i = 0; i < 6; i++) {
      const ang = Math.random() * Math.PI * 2;
      const sp  = 60 + Math.random() * 120;
      ST.sparks.push({
        x: c.x, y: c.y,
        vx: Math.cos(ang) * sp,
        vy: Math.sin(ang) * sp - 40,
        life: 0.5, maxLife: 0.5,
        size: 2 + Math.random() * 2,
        hue: 50 + Math.random() * 20,
      });
    }
  }

  function registerHit(a) {
    ST.hits = Math.min(MAX_LIVES, ST.hits + 1);
    ST.invulMs = 1100;
    ST.flashMs = 280;
    sndHit();
    addShake(12, 480);
    popup('-1 LIFE', ST.rocket.x, ST.rocket.y - 30, 'red');
    // Big debris burst from asteroid.
    for (let i = 0; i < 22; i++) {
      const ang = Math.random() * Math.PI * 2;
      const sp  = 100 + Math.random() * 220;
      ST.sparks.push({
        x: a.x, y: a.y,
        vx: Math.cos(ang) * sp,
        vy: Math.sin(ang) * sp,
        life: 0.6 + Math.random() * 0.5,
        maxLife: 1.0,
        size: 2 + Math.random() * 4,
        hue: 18 + Math.random() * 18,
      });
    }
  }

  // ── End game ──────────────────────────────────────────────
  let _ending = false;
  async function endGame(reason) {
    if (_ending) return; _ending = true;
    ST.phase = PHASE_END;
    sndGameOver();
    addShake(8, 600);

    let resp = null;
    try {
      const r = await fetch(`${API}/litlaunch/end`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sessionId: ST.sessionId,
          token:     ST.token,
          score:     ST.score,
          hits:      ST.hits,
          durationMs: Math.round(ST.elapsedMs),
          taps:      ST.taps,
        }),
      });
      resp = await r.json();
      if (!r.ok || resp.error) showErr(resp?.reason || resp?.error || 'end_failed');
    } catch {
      showErr('Network error');
    }
    _ending = false;

    const score   = Number(resp?.score   ?? ST.score);
    const hits    = Number(resp?.hits    ?? ST.hits);
    const awarded = Number(resp?.awarded ?? score);
    const best    = Number(resp?.bestScore ?? 0);
    const txUrl   = resp?.explorerUrl || null;

    postParent({
      type: 'litdex:litlaunch:end',
      reason,
      score, hits, awarded, best,
      txInfo: txUrl ? { txHash: resp.txHash, explorerUrl: txUrl } : null,
    });

    fetchStats().then((stats) => {
      const left = stats ? Math.max(0, Number(stats.gamesLeft || 0)) : 0;
      ST.gamesLeft = left;
      const body = `
        <div class="panel-big green">+${awarded} PTS</div>
        <div class="panel-stat-row"><span class="lbl">Coins</span><span class="val">${score}</span></div>
        <div class="panel-stat-row"><span class="lbl">Hits</span><span class="val">${hits} / ${MAX_LIVES}</span></div>
        <div class="panel-stat-row"><span class="lbl">Best Score</span><span class="val">${best}</span></div>
        ${txUrl ? `<div class="panel-stat-row"><span class="lbl">Tx</span><a class="val" style="color:#5be0a4;text-decoration:underline" href="${txUrl}" target="_blank" rel="noreferrer">${(resp.txHash || '').slice(0,10)}…</a></div>` : ''}
      `;
      panelTitle.textContent = reason === 'cap' ? 'COIN CAP' : 'GAME OVER';
      panelSub.textContent   = reason === 'cap' ? 'You hit the per-game cap.' : 'Lost all 3 lives.';
      panelBody.innerHTML    = body;
      btnPrimary.disabled    = left <= 0;
      btnPrimary.textContent = left <= 0 ? 'NO GAMES LEFT' : 'PLAY AGAIN';
      btnPrimary.onclick     = left <= 0 ? () => {} : startGame;
      panel.classList.remove('hidden');
    });
  }

  function applyShake() {
    if (ST.shakeAmp > 0) {
      ST.shakeAmp = Math.max(0, ST.shakeAmp - ST.shakeDecay * 0.016);
      const a = ST.shakeAmp;
      const dx = (Math.random() - 0.5) * 2 * a;
      const dy = (Math.random() - 0.5) * 2 * a;
      shakeHost.style.transform = `translate(${dx.toFixed(2)}px, ${dy.toFixed(2)}px)`;
    } else {
      shakeHost.style.transform = '';
    }
  }

  // ── Render ────────────────────────────────────────────────
  function drawStage() {
    const W = vw(), H = vh();
    stage.clearRect(0, 0, W, H);

    drawStars();

    // Lane edges (subtle).
    stage.strokeStyle = 'rgba(140,200,255,0.05)';
    stage.lineWidth = 1;
    stage.beginPath(); stage.moveTo(LANE_PADDING + 0.5, 0); stage.lineTo(LANE_PADDING + 0.5, H); stage.stroke();
    stage.beginPath(); stage.moveTo(W - LANE_PADDING - 0.5, 0); stage.lineTo(W - LANE_PADDING - 0.5, H); stage.stroke();

    // Trail (under everything).
    for (const p of ST.trail) drawTrailParticle(p);

    // Coins.
    for (const c of ST.coins) drawCoin(c);

    // Asteroids.
    for (const a of ST.asteroids) drawAsteroid(a);

    // Rocket.
    drawRocket();

    // Sparks (above rocket).
    for (const p of ST.sparks) drawSpark(p);

    // Damage flash.
    if (ST.flashMs > 0) {
      stage.fillStyle = `rgba(255,80,80,${0.2 * (ST.flashMs / 280)})`;
      stage.fillRect(0, 0, W, H);
    }
  }

  function drawStars() {
    const W = vw(), H = vh();
    const scrollPx = (ST.phase === PHASE_FLIGHT)
      ? (ST.elapsedMs / 1000) * SCROLL_BASE_PXS * (0.5 + ST.speedMul * 0.5)
      : 0;
    const layers = [
      { layer: ST.parallax.far,  factor: 0.3, alpha: 0.45 },
      { layer: ST.parallax.mid,  factor: 0.6, alpha: 0.7  },
      { layer: ST.parallax.near, factor: 0.9, alpha: 1.0  },
    ];
    stage.fillStyle = '#fff';
    for (const { layer, factor, alpha } of layers) {
      const off = scrollPx * factor;
      for (const s of layer) {
        const y = ((s.y + off) % H + H) % H;
        const tw = 0.5 + 0.5 * Math.abs(Math.sin(performance.now() * 0.0012 * s.tw + s.x));
        stage.globalAlpha = alpha * (0.4 + tw * 0.6);
        stage.beginPath();
        stage.arc(s.x, y, s.r, 0, Math.PI * 2);
        stage.fill();
      }
    }
    stage.globalAlpha = 1;
  }

  function drawTrailParticle(p) {
    const a = Math.max(0, p.life / p.maxLife);
    stage.save();
    stage.globalAlpha = a;
    stage.fillStyle = `hsl(${p.hue}, 95%, 60%)`;
    stage.shadowColor = `hsl(${p.hue}, 95%, 65%)`;
    stage.shadowBlur = 12;
    stage.beginPath();
    stage.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    stage.fill();
    stage.restore();
  }

  function drawSpark(p) {
    const a = Math.max(0, p.life / p.maxLife);
    stage.save();
    stage.globalAlpha = a;
    stage.fillStyle = `hsl(${p.hue}, 95%, 60%)`;
    stage.shadowColor = `hsl(${p.hue}, 95%, 60%)`;
    stage.shadowBlur = 8;
    stage.beginPath();
    stage.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    stage.fill();
    stage.restore();
  }

  function drawCoin(c) {
    const w = c.r * Math.abs(Math.cos(c.twirl));
    stage.save();
    stage.translate(c.x, c.y);
    // Outer glow.
    stage.shadowColor = '#ffd76a';
    stage.shadowBlur = 14;
    const grd = stage.createRadialGradient(-w * 0.3, -c.r * 0.3, c.r * 0.2, 0, 0, c.r);
    grd.addColorStop(0, '#fff5d2');
    grd.addColorStop(0.45, '#ffd76a');
    grd.addColorStop(1, '#a16e10');
    stage.fillStyle = grd;
    stage.beginPath();
    stage.ellipse(0, 0, Math.max(2, w), c.r, 0, 0, Math.PI * 2);
    stage.fill();
    stage.shadowBlur = 0;
    // Inner ring.
    stage.strokeStyle = 'rgba(255,255,255,0.55)';
    stage.lineWidth = 1.2;
    stage.beginPath();
    stage.ellipse(0, 0, Math.max(1, w * 0.7), c.r * 0.7, 0, 0, Math.PI * 2);
    stage.stroke();
    // L glyph.
    if (w > 4) {
      stage.fillStyle = 'rgba(110,70,10,0.85)';
      stage.font = `bold ${Math.floor(c.r * 1.1)}px 'Bangers', cursive`;
      stage.textAlign = 'center';
      stage.textBaseline = 'middle';
      stage.fillText('L', 0, 1);
    }
    stage.restore();
  }

  function drawAsteroid(a) {
    stage.save();
    stage.translate(a.x, a.y);
    stage.rotate(a.rot);
    // Body.
    const grd = stage.createRadialGradient(-a.r * 0.3, -a.r * 0.3, a.r * 0.2, 0, 0, a.r);
    grd.addColorStop(0, '#a08070');
    grd.addColorStop(0.55, '#5a4a40');
    grd.addColorStop(1, '#241914');
    stage.fillStyle = grd;
    stage.beginPath();
    // Lumpy polygon.
    const sides = 9;
    for (let i = 0; i <= sides; i++) {
      const ang = (i / sides) * Math.PI * 2;
      const rr = a.r * (0.78 + 0.22 * Math.sin(i * 1.7 + a.r));
      const x = Math.cos(ang) * rr;
      const y = Math.sin(ang) * rr;
      if (i === 0) stage.moveTo(x, y); else stage.lineTo(x, y);
    }
    stage.closePath();
    stage.fill();
    stage.strokeStyle = 'rgba(0,0,0,0.5)';
    stage.lineWidth = 1.2;
    stage.stroke();
    // Crater specks.
    stage.fillStyle = 'rgba(0,0,0,0.45)';
    [[-0.3, -0.2, 0.18], [0.25, 0.1, 0.22], [-0.15, 0.35, 0.14]].forEach(([fx, fy, fr]) => {
      stage.beginPath();
      stage.arc(fx * a.r, fy * a.r, fr * a.r, 0, Math.PI * 2);
      stage.fill();
    });
    stage.restore();
  }

  function drawRocket() {
    if (ST.phase === PHASE_LOBBY) return;
    const x = ST.rocket.x, y = ST.rocket.y;
    const tilt = Math.max(-0.25, Math.min(0.25, (ST.rocket.targetX - ST.rocket.x) * 0.01));
    stage.save();
    stage.translate(x, y);
    stage.rotate(tilt);
    // Engine glow underneath.
    const glowGrd = stage.createRadialGradient(0, ROCKET_H * 0.55, 4, 0, ROCKET_H * 0.55, ROCKET_H * 0.65);
    glowGrd.addColorStop(0, 'rgba(255,240,180,1)');
    glowGrd.addColorStop(0.4, 'rgba(255,140,40,0.8)');
    glowGrd.addColorStop(1, 'rgba(255,80,20,0)');
    stage.fillStyle = glowGrd;
    stage.beginPath();
    stage.arc(0, ROCKET_H * 0.55, ROCKET_H * 0.55, 0, Math.PI * 2);
    stage.fill();

    // Body
    const flicker = (ST.invulMs > 0 && Math.floor(performance.now() / 80) % 2 === 0) ? 0.55 : 1;
    stage.globalAlpha = flicker;

    const grd = stage.createLinearGradient(-ROCKET_W / 2, 0, ROCKET_W / 2, 0);
    grd.addColorStop(0, '#7c95b8');
    grd.addColorStop(0.5, '#e6edf6');
    grd.addColorStop(1, '#7c95b8');
    stage.fillStyle = grd;
    roundRect(stage, -ROCKET_W * 0.32, -ROCKET_H * 0.45, ROCKET_W * 0.64, ROCKET_H * 0.85, 8);
    stage.fill();
    // Window
    stage.fillStyle = '#5be0a4';
    stage.beginPath();
    stage.arc(0, -ROCKET_H * 0.18, ROCKET_W * 0.16, 0, Math.PI * 2);
    stage.fill();
    stage.fillStyle = 'rgba(255,255,255,0.6)';
    stage.beginPath();
    stage.arc(-ROCKET_W * 0.05, -ROCKET_H * 0.21, ROCKET_W * 0.06, 0, Math.PI * 2);
    stage.fill();
    // Fins
    stage.fillStyle = '#ff7a45';
    stage.beginPath();
    stage.moveTo(-ROCKET_W * 0.32, ROCKET_H * 0.2);
    stage.lineTo(-ROCKET_W * 0.55, ROCKET_H * 0.45);
    stage.lineTo(-ROCKET_W * 0.32, ROCKET_H * 0.45);
    stage.closePath();
    stage.fill();
    stage.beginPath();
    stage.moveTo(ROCKET_W * 0.32, ROCKET_H * 0.2);
    stage.lineTo(ROCKET_W * 0.55, ROCKET_H * 0.45);
    stage.lineTo(ROCKET_W * 0.32, ROCKET_H * 0.45);
    stage.closePath();
    stage.fill();
    // Nose cone
    stage.fillStyle = '#ff7a45';
    stage.beginPath();
    stage.moveTo(-ROCKET_W * 0.32, -ROCKET_H * 0.45);
    stage.lineTo(0, -ROCKET_H * 0.7);
    stage.lineTo(ROCKET_W * 0.32, -ROCKET_H * 0.45);
    stage.closePath();
    stage.fill();

    stage.globalAlpha = 1;
    stage.restore();
  }

  function roundRect(c, x, y, w, h, r) {
    r = Math.max(0, Math.min(r, w / 2, h / 2));
    c.beginPath();
    c.moveTo(x + r, y);
    c.lineTo(x + w - r, y); c.quadraticCurveTo(x + w, y, x + w, y + r);
    c.lineTo(x + w, y + h - r); c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    c.lineTo(x + r, y + h); c.quadraticCurveTo(x, y + h, x, y + h - r);
    c.lineTo(x, y + r); c.quadraticCurveTo(x, y, x + r, y);
    c.closePath();
  }

  // ── Boot ──────────────────────────────────────────────────
  (async () => {
    if (!wallet) {
      showPanel(
        'LIT LAUNCH',
        'Wallet missing',
        '<div style="color:#ef4956;font-family:JetBrains Mono,monospace;font-size:11px">Open this game from the LitDeX games page.</div>',
        'CLOSE',
        () => postParent({ type: 'litdex:litlaunch:exit' })
      );
      return;
    }
    initParallax();
    initRocket();
    drawStage();
    await showLobby();
  })();
})();
</script>
</body>
</html>
